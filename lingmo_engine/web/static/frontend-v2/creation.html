<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n-title="character_creation">角色创建 — LingMo Engine</title>
  <link rel="stylesheet" href="/static/frontend-v2/shared/css-variables.css">
  <!-- UI_LABELS_INJECTION -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-ui);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    #creation-screen {
      max-width: 560px;
      width: 90%;
    }
    #creation-screen h1 {
      font-family: var(--font-narrative);
      font-size: calc(28px * var(--font-scale));
      color: var(--color-primary);
      text-align: center;
      margin-bottom: 32px;
    }
    #creation-content {
      background: var(--color-surface);
      border: 1px solid var(--color-border-strong);
      border-radius: var(--radius-lg);
      padding: var(--space-xxl);
      min-height: 300px;
    }
    .loading {
      text-align: center;
      color: var(--color-text-dim);
      padding: 48px 0;
    }
  </style>
  <!-- THEME_CSS -->
</head>
<body>
  <div id="creation-screen">
    <h1 data-i18n="character_creation">角色创建</h1>
    <div id="creation-content">
      <div class="loading" data-i18n="connecting">正在连接游戏服务器…</div>
    </div>
  </div>

  <script type="module" src="/static/frontend-v2/creation.js"></script>
</body>
</html>
