# Preset templates for quick NPC/monster generation
templates:
  - id: human_mercenary
    name: "Human Mercenary"
    description: "A battle-hardened mercenary, common in Ashen Frontier and Ironhaven."
    char_type: npc
    aptitude_bias:
      force: 1.2
      tenacity: 1.1
      agility: 1.0
      mana: 0.5
      stamina: 1.1
    default_tags: ["Human", "mercenary"]

  - id: undead_walker
    name: "Undead Walker"
    description: "A shambling corpse animated by the Ashen Blight. Mindless but dangerous in numbers."
    char_type: monster
    aptitude_bias:
      force: 0.8
      tenacity: 1.3
      agility: 0.4
      mana: 0.0
      stamina: 1.5
    default_tags: ["Undead"]

  - id: blight_beast
    name: "Blight Beast"
    description: "A creature warped by the Ashen Blight into an aggressive predator."
    char_type: monster
    aptitude_bias:
      force: 1.4
      tenacity: 1.0
      agility: 1.3
      mana: 0.3
      stamina: 1.2
    default_tags: ["Beast", "Aberration"]

  - id: ashborn_horror
    name: "Ashborn Horror"
    description: "A powerful Aberration born from concentrated ash corruption."
    char_type: monster
    aptitude_bias:
      force: 1.5
      tenacity: 1.4
      agility: 0.8
      mana: 1.2
      stamina: 1.3
    default_tags: ["Aberration"]

  - id: town_guard
    name: "Town Guard"
    description: "A guard patrolling the safer settlements. Not a warrior but not helpless."
    char_type: npc
    aptitude_bias:
      force: 1.0
      tenacity: 1.2
      agility: 0.9
      mana: 0.3
      stamina: 1.0
    default_tags: ["Human", "guard"]
