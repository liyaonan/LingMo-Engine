  - name: Deep Grove
    parent: ashenveil
    description: A forest that resists the Blight. Ancient trees with bark like iron,
      roots that glow faintly with Nature element. Scholars believe the grove holds
      secrets to Ember Seeds.
    center:
    - 18
    - 5
    radius: 4
    type: wilderness
    facilities: []
    blight_level: 0.1
    id: deep_grove
  - name: Sunken Temple
    parent: ashenveil
    description: Half-submerged ruins of a pre-Empire temple. Ancient murals depict
      a ritual to mend the Veil. Water drips with faint luminescence.
    center:
    - 20
    - 8
    radius: 2
    type: ruin
    facilities: []
    blight_level: 0.3
    id: sunken_temple
  - name: Ember Glade
    parent: ashenveil
    description: A clearing where the trees form a perfect circle. In the center,
      a single ember-colored flower blooms year-round. Named for the rumored Ember
      Seed buried beneath.
    center:
    - 16
    - 3
    radius: 1
    type: wilderness
    facilities: []
    blight_level: 0.0
    id: ember_glade
  - name: Ashen Spire
    parent: ashenveil
    description: A tower of fused ash and stone, risen from the ground during the
      Blight. No one knows who built it or why. The air around it hums with Shadow
      element.
    center:
    - 22
    - 4
    radius: 2
    type: ruin
    facilities: []
    blight_level: 0.4
    id: ashen_spire
  - name: Outer Walls
    parent: ashenveil
    description: The remnants of the Aethermere Empire's capital walls. Massive, blackened,
      scarred by a thousand battles. The Blight is strongest here.
    center:
    - 10
    - 18
    radius: 3
    type: fortress
    facilities: []
    blight_level: 0.9
    id: outer_walls
  - name: Throne of Ash
    parent: ashenveil
    description: The imperial throne room, now a cavern of crystallized ash. The throne
      itself pulses with dark energy. The Ashen Blight's heart may beat somewhere
      beneath.
    center:
    - 10
    - 20
    radius: 2
    type: ruin
    facilities: []
    blight_level: 1.0
    id: throne_of_ash
  - name: The Veil Rift
    parent: ashenveil
    description: A tear in the fabric between life and death. The source of the Ashen
      Blight. Shadow element bleeds through like ink in water. Mending this rift is
      the ultimate goal — and the ultimate danger.
    center:
    - 11
    - 22
    radius: 3
    type: ruin
    facilities: []
    blight_level: 1.0
    id: veil_rift
