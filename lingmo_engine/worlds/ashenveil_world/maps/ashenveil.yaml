    parent: ashenveil
    description: A crude palisade of scorched timber. The last safe stop before the
      Blight's edge. Smells of woodsmoke and desperation.
    center:
    - 5
    - 5
    radius: 3
    type: fortress
    blight_level: 0.1
    id: frontier_outpost
    children_ids:
