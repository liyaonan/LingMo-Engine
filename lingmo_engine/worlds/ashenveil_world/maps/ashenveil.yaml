  - name: Blight's Edge
    parent: ashenveil
    description: The creeping boundary of the Ashen Blight. The ground turns from
      brown to gray. Nothing grows here. The air tastes of copper and decay.
    center:
    - 2
    - 4
    radius: 4
    type: wilderness
    facilities: []
    blight_level: 0.7
    id: blight_edge
  - name: Frontier Watchtower
    parent: ashenveil
    description: A stone tower overlooking the Blight's Edge. Manned by volunteer
      sentries who watch for Ashborn incursions.
    center:
    - 6
    - 3
    radius: 1
    type: fortress
    facilities: []
    blight_level: 0.2
    id: watchtower
  - name: Ash Fields
    parent: ashenveil
    description: An expanse of gray dust where fields once grew. The ash swirls in
      slow eddies, occasionally revealing bones.
    center:
    - 4
    - 12
    radius: 5
    type: wilderness
    facilities: []
    blight_level: 0.8
    id: ash_fields
  - name: Dead Forest
    parent: ashenveil
    description: Petrified trees stand like sentinels of a forgotten age. Branches
      creak in the wind like bones. Things move between the trunks.
    center:
    - 7
    - 11
    radius: 3
    type: wilderness
    facilities: []
    blight_level: 0.6
    id: dead_forest
  - name: Abandoned Mine
    parent: ashenveil
    description: Once yielded iron and coal. Now a labyrinth of dark tunnels where
      Ashborn nest. Rumors of Ember Seed fragments deep within.
    center:
    - 8
    - 14
    radius: 2
    type: ruin
    facilities: []
    blight_level: 0.5
    id: abandoned_mine
  - name: Crossroads Inn
    parent: ashenveil
    description: A fortified inn at the junction of three roads. Merchants, mercenaries,
      and refugees share tables and rumors. The safest stop in the Marches.
    center:
    - 5
    - 15
    radius: 2
    type: town
    blight_level: 0.2
    id: crossroads
