  - id: ability_soul_shield
    name: "Soul Shield"
    summary: "Weave a barrier of shadow that absorbs damage and bolsters tenacity."
    category: ashen
    description: "A shimmering membrane of compressed soul-energy wraps around you, deflecting blows and hardening your will."
    rarity: 65
    costs:
      mana: 6
    cooldown: 4
    effects:
      - type: shield
        target: self
        power: 0.35
        duration: 2
      - type: buff
        target: self
        attribute: tenacity
        modifier: 0.15
        duration: 3
    tags: [spell, shield, buff, shadow, defense, ashen]
    rarity_tier: epic

  - id: ability_veil_rip
    name: "Veil Rip"
    summary: "Tear reality itself to unleash devastating armor-piercing corruption on all foes."
    category: ashen
    description: "The veil between worlds splits open. A torrent of shadow pours through, shredding armor and resolve alike."
    rarity: 90
    costs:
      mana: 12
    cooldown: 6
    effects:
