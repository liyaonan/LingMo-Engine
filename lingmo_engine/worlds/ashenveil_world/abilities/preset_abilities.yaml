        target: enemies
        power: 7.0
        duration: 0
      - type: debuff
        target: enemies
        attribute: force
        modifier: -0.25
        duration: 2
      - type: debuff
        target: enemies
        attribute: tenacity
        modifier: -0.25
        duration: 2
    tags: [spell, damage, debuff, aoe, shadow, piercing, ashen]
