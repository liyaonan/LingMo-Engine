    tags: [artifact, healing, cleanse, fire]

  - id: ashen_stimulant
    name: "Ashen Stimulant"
    summary: "Boosts force but reduces tenacity temporarily."
    category: consumable
    description: "A volatile powder that sends a surge of power through the user's veins, hardening resolve but leaving the body vulnerable."
    rarity: 30
    sell_price: 35
    combat_only: true
    quantity: 1
