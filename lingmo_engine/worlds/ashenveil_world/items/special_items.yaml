  - id: holy_water
    name: "Holy Water"
    summary: "Deals significant damage to an enemy."
    category: consumable
    description: "Blessed water that sears unholy flesh, dealing devastating damage to a single target."
    rarity: 35
    sell_price: 40
    combat_only: true
    quantity: 1
    costs: []
    effects:
      - {type: damage, value: 2.0, target: enemy}
    tags: [potion, damage]
