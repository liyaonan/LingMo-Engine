  - id: ember_seed_fragment
    name: "Ember Seed Fragment"
    summary: "A potent relic that heals deeply and purifies afflictions."
    category: consumable
    description: "A glowing shard of an ancient Ember Seed, radiating warmth that mends flesh and spirit alike."
    rarity: 80
    sell_price: 200
    combat_only: false
    quantity: 1
