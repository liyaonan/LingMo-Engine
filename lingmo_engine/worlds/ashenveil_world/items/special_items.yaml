special_items:
  - id: health_potion
    name: "Health Potion"
    summary: "Restores a portion of health."
    category: consumable
    description: "A flask of crimson liquid that mends wounds upon consumption."
    rarity: 10
    sell_price: 10
    combat_only: true
    quantity: 1
    costs: []
    effects:
      - {type: heal, value: 0.30, target: self}
    tags: [potion, healing]

  - id: mana_draught
    name: "Mana Draught"
    summary: "Restores a portion of mana."
    category: consumable
    description: "A vial of luminescent blue liquid that replenishes arcane energy."
    rarity: 10
    sell_price: 10
    combat_only: true
    quantity: 1
    costs: []
    effects:
      - {type: heal, attribute: mana, value: 0.30, target: self}
