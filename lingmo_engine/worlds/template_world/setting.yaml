# Template World — 最小可行世界包
# 无修仙、无灵根、无境界 — 证明框架与世界观完全解耦

world:
  name: "Template World"
  description: >
    A minimal world template for creating new worlds.
    No cultivation, no spiritual roots, no xianxia elements.
    Use this as a starting point for any genre.
  version: "0.1"

entity_query:
  fuzzy_threshold: 5
  cache_size: 30
  type_thresholds:
    ability: 3
    item: 5
    character: 3

map:
  hierarchy: ["Region", "Domain", "Location"]
  scale: 10
  visibility_multiplier: 4
  independent_roots: true

