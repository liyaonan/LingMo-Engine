# ═══════════════════════════════════
# 六、突破规则
# ═══════════════════════════════════
breakthrough_rules:
  general:
    modifier_sources:
      - {id: root_quality, type: multiplier, description: 灵根资质倍率修正}
      - {id: elixir, type: additive, range: [0.05, 0.40], description: 丹药加成}
      - {id: qi_density, type: additive, range: [0.05, 0.20], description: 灵气浓度加成}
      - {id: guardian, type: additive, value: 0.10, description: 护法者加成}
      - {id: secondary_path_synergy, type: additive, value: 0.05, description: 辅修协同加成}

  per_transition:
    mortal_to_qi_condensation:
      requirements: {stage: mortal, spiritual_power_min: 75}
      base_rate: 0.70
      tribulation: null
      success: {lifespan_gain: 50}
      failure: {cooldown_days: 7}

    qi_condensation_to_foundation:
      requirements: {stage: qi_condensation, spiritual_power_min: 200}
      base_rate: 0.50
      tribulation: {type: thunder, waves: 3, enemy_power_ratio: 0.4}
      success: {lifespan_gain: 100}
      failure: {cooldown_days: 30}

    foundation_to_golden_core:
      requirements: {stage: foundation, spiritual_power_min: 600, enlightenment: 30}
      base_rate: 0.40
      tribulation: null
      success: {lifespan_gain: 250}
      failure: {cooldown_days: 60}

    golden_core_to_nascent_soul:
