# ═══════════════════════════════════
# 一、三界定义
# ═══════════════════════════════════
realms:
  - id: mortal
    name: 人界
    order: 1
    base_qi_density: 0.4
    max_stage: divine_transformation
    transition: 化神圆满渡小天劫飞升至灵界
  - id: spirit
    name: 灵界
    order: 2
    base_qi_density: 1.0
    max_stage: great_vehicle
    transition: 大乘圆满得天道认可飞升仙界
  - id: immortal
    name: 仙界
    order: 3
    base_qi_density: 2.0
    max_stage: daluo_golden_immortal
    transition: null

# ═══════════════════════════════════
# 二、境界体系（14境）
# ═══════════════════════════════════
stages:
  # 人界篇
  - id: mortal
    name: 凡人
    realm: mortal
    order: 0
    sp_range: [0, 75]
    sub_stages: [1]
    sub_label: 级
    lifespan: 100
    power_multiplier: 1.0
    combat_mult: 1
    cultivation_attrs: []
    breakthrough_to: qi_condensation

  - id: qi_condensation
    name: 练气期
    realm: mortal
    order: 1
    sp_range: [75, 200]
    sub_stages: [1, 2, 3, 4, 5, 6, 7, 8, 9]
    sub_label: 层
    sub_labels_cn: {consummate: 圆满}
    lifespan: 200
    power_multiplier: 1.5
    combat_mult: 1.5
    cultivation_attrs: [spiritual_power]
    abilities_unlocked:
      - id: spiritual_sense
        name: 灵气感知
        description: 可感知周围天地灵气的流动
    breakthrough_to: foundation

  - id: foundation
    name: 筑基期
    realm: mortal
    order: 2
    sp_range: [200, 600]
    sub_stages: [early, middle, late]
    sub_labels_cn: {early: 初期, middle: 中期, late: 后期, consummate: 圆满}
    lifespan: 400
    power_multiplier: 2.5
    combat_mult: 4
    cultivation_attrs: [divine_sense, max_divine_sense]
    abilities_unlocked:
      - id: fly_sword
        name: 御器飞行
        description: 可驾驭法宝飞行
    breakthrough_to: golden_core

  - id: golden_core
    name: 金丹期
    realm: mortal
    order: 3
    sp_range: [600, 2000]
    sub_stages: [early, middle, late]
    sub_labels_cn: {early: 初期, middle: 中期, late: 后期, consummate: 圆满}
    lifespan: 900
    power_multiplier: 5.0
    combat_mult: 12
    cultivation_attrs: []
    abilities_unlocked:
      - id: golden_core_self_destruct
        name: 金丹自爆
        description: 危急时可引爆金丹与敌同归于尽
    breakthrough_to: nascent_soul

  - id: nascent_soul
    name: 元婴期
    realm: mortal
    order: 4
    sp_range: [2000, 7500]
    sub_stages: [early, middle, late]
    sub_labels_cn: {early: 初期, middle: 中期, late: 后期, consummate: 圆满}
    lifespan: 1900
    power_multiplier: 10.0
    combat_mult: 40
    cultivation_attrs: []
    abilities_unlocked:
      - id: nascent_soul_escape
        name: 元婴遁出
        description: 肉身毁灭时元婴可逃遁，寻找夺舍目标
      - id: possession
        name: 夺舍
        description: 元婴可夺取他人肉身
    breakthrough_to: divine_transformation

  - id: divine_transformation
    name: 化神期
    realm: mortal
    order: 5
    sp_range: [7500, 30000]
    sub_stages: [early, middle, late]
    sub_labels_cn: {early: 初期, middle: 中期, late: 后期, consummate: 圆满}
    lifespan: 4900
    power_multiplier: 20.0
    combat_mult: 150
    cultivation_attrs: []
    abilities_unlocked:
      - id: heaven_earth_sense
        name: 天人感应
        description: 可感知天地法则的运转
    breakthrough_to: void_refinement

  # 灵界篇
  - id: void_refinement
    name: 炼虚期
    realm: spirit
    order: 6
    sp_range: [30000, 125000]
    sub_stages: [early, middle, late]
    sub_labels_cn: {early: 初期, middle: 中期, late: 后期, consummate: 圆满}
    lifespan: 14900
    power_multiplier: 40.0
    combat_mult: 600
    cultivation_attrs: []
    breakthrough_to: body_integration

  - id: body_integration
    name: 合体期
    realm: spirit
    order: 7
    sp_range: [125000, 500000]
    sub_stages: [early, middle, late]
    sub_labels_cn: {early: 初期, middle: 中期, late: 后期, consummate: 圆满}
    lifespan: 44900
    power_multiplier: 80.0
    combat_mult: 2500
    cultivation_attrs: []
    breakthrough_to: great_vehicle

  - id: great_vehicle
    name: 大乘期
    realm: spirit
    order: 8
    sp_range: [500000, 1500000]
    sub_stages: [early, middle, late]
    sub_labels_cn: {early: 初期, middle: 中期, late: 后期, consummate: 圆满}
    lifespan: 144900
    power_multiplier: 150.0
    combat_mult: 10000
    cultivation_attrs: []
    breakthrough_to: tribulation

  # 仙界篇
  - id: tribulation
    name: 渡劫期
    realm: immortal
    order: 9
    sp_range: [1500000, 3000000]
    sub_stages: [early, middle, late]
    sub_labels_cn: {early: 初期, middle: 中期, late: 后期, consummate: 圆满}
    lifespan: 999999
    power_multiplier: 300.0
    combat_mult: 30000
    cultivation_attrs: []
    abilities_unlocked:
      - id: immortal_body
        name: 仙体初成
        description: 肉身开始转化为仙体，不老不死
    breakthrough_to: true_immortal

  - id: true_immortal
    name: 真仙
    realm: immortal
    order: 10
    sp_range: [3000000, 5000000]
    sub_stages: [early, middle, late]
    sub_labels_cn: {early: 初期, middle: 中期, late: 后期, consummate: 圆满}
    lifespan: 999999
    power_multiplier: 500.0
    combat_mult: 60000
    breakthrough_to: golden_immortal

  - id: golden_immortal
    name: 金仙
    realm: immortal
    order: 11
    sp_range: [5000000, 7500000]
    sub_stages: [early, middle, late]
    sub_labels_cn: {early: 初期, middle: 中期, late: 后期, consummate: 圆满}
    lifespan: 999999
    power_multiplier: 1000.0
    combat_mult: 100000
    abilities_unlocked:
      - id: law_mastery
        name: 法则掌控
        description: 一念可定乾坤，执掌天道法则
    breakthrough_to: taiyi_golden_immortal

  - id: taiyi_golden_immortal
    name: 太乙金仙
    realm: immortal
    order: 12
    sp_range: [7500000, 10000000]
    sub_stages: [early, middle, late]
    sub_labels_cn: {early: 初期, middle: 中期, late: 后期, consummate: 圆满}
    lifespan: 999999
    power_multiplier: 3000.0
    combat_mult: 150000
    breakthrough_to: daluo_golden_immortal

  - id: daluo_golden_immortal
    name: 大罗金仙
    realm: immortal
    order: 13
    sp_range: [10000000, null]
    sub_stages: [1]
    sub_label: ""
    lifespan: 999999
    power_multiplier: 10000.0
    combat_mult: 200000
    breakthrough_to: null

# ═══════════════════════════════════
# 三、灵根系统
# ═══════════════════════════════════
spiritual_roots:
  basic_elements:
    - {id: metal, name: 金}
    - {id: wood, name: 木}
    - {id: water, name: 水}
    - {id: fire, name: 火}
    - {id: earth, name: 土}
  variant_elements:
    - {id: thunder, name: 雷, inherit: metal}
    - {id: ice, name: 冰, inherit: water}
    - {id: wind, name: 风, inherit: wood}
  count_to_quality:
    1: {name: 天灵根, speed_mult: 3.0, rarity: 极其罕见}
    2: {name: 上品灵根, speed_mult: 1.5, rarity: 少见}
    3: {name: 中品灵根, speed_mult: 1.0, rarity: 常见}
    4: {name: 下品灵根, speed_mult: 0.6, rarity: 较多}
    5: {name: 废灵根, speed_mult: 0.3, rarity: 普遍}

# ═══════════════════════════════════
# 四、五行生克
# ═══════════════════════════════════
element_interactions:
  generation_chain: [wood, fire, earth, metal, water]
  conquer_map:
    metal: wood
    wood: earth
    earth: water
    water: fire
    fire: metal
  generation_bonus: 0.25
  conquer_bonus: 0.30

# ═══════════════════════════════════
# 五点五、专属属性精通规则
# ═══════════════════════════════════
mastery_rules:
  max_boost: 0.20
  formula: "value * (1 + mastery / 100 * max_boost)"
  caps:
    main: 100
    secondary: 60
    other: 30

