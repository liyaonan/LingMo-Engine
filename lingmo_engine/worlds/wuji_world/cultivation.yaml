dao_rhyme:
  thresholds:
    0: 3
    1: 8
    2: 15
    3: 25
    4: 40
    5: 60
    6: 85
    7: 115
    8: 150
    9: 190
    10: 235
    11: 285
    12: 340
  grant_cap_ratio: 0.15
  enlightenment_ratio: 1.5
  low_rhyme_ratio: 0.3

# ═════════════════════════════════════
# 六、种族
# ═════════════════════════════════════
races:
  - id: human
    name: 人族
    description: "非灵界原住民，飞升者后代。功法体系最完善，根基最浅，盟友最少"
    native_realm: mortal       # 人界为主活动范围
  - id: demon
    name: 妖族
    description: "最强大的原生种族，灵气孕育灵兽觉醒灵智而成。血脉尊卑，龙凤为皇"
    native_realm: spirit       # 灵界原生
  - id: spirit
    name: 灵族
    description: "灵气极高处自然凝聚诞生，天生天道亲和。数量稀少，对灵气枯竭最敏感"
    native_realm: spirit
  - id: ghost
    name: 鬼族
    description: "强大修士残魂不灭凝聚而成，国土在冥渊阴影层。与人族夺舍矛盾最深"
    native_realm: spirit
  - id: fiend
    name: 魔族
    description: "最被孤立的种族，起源成谜。以负面情绪为食，以血祭为仪式"
    native_realm: spirit
  # --- 仙界篇种族 ---
  - id: celestial
    name: 仙族
    description: "仙界原生种族，由仙气凝聚自然诞生。天生亲和天道法则，个体实力极强但数量稀少。散居各仙域，以天枢仙域最为集中"
    native_realm: immortal
  - id: divine
    name: 神族
    description: "上古开辟仙界的远古种族，曾与天道齐平。如今血脉稀薄，后裔隐居荒古寨，守护最古老的祭祀仪式。仙界最古老也最神秘的种族"
    native_realm: immortal
  - id: heavenly_demon
    name: 天魔族
    description: "来自域外混沌的入侵种族，仙界边境最大威胁。以吞噬仙气为生，个体战力可匹敌金仙。天关州是抵御天魔的前线"
    native_realm: outer_domain
