# ═══════════════════════════════════
# 修炼经济系统（v2 重构）
# ═══════════════════════════════════

# 基础灵气吸收率（灵力/天）—— 所有境界统一
base_absorption:
  base: 0.025

# 灵根资质系数（影响基础提取率和高浓度灵气利用率）
root_power:
  heavenly: 1.0     # 天灵根（单属性）
  upper: 0.8        # 上品（双属性）
  middle: 0.6       # 中品（三属性）
  lower: 0.4        # 下品（四属性）
  waste: 0.3        # 废灵根（五属性）

# 修炼方式修正
cultivation_methods:
  meditation:
    name: 打坐冥想
    speed_mult: 1.0
  seclusion:
    name: 闭关修炼
    speed_mult: 2.0

# 灵石兑换
spirit_stone_conversion:
  rate: 100          # 100下品灵石 = 1灵力
  grades:
    low: 1            # 下品灵石
    mid: 100          # 中品灵石 = 100灵力
    high: 10000       # 上品灵石 = 10000灵力
    supreme: 100000   # 极品灵石

# 丹药系统
pills:
  - id: gathering_pill
    name: 聚灵丹
    sp_gain: 20
    rarity: common
    stone_value: 2000
  - id: accumulating_pill
    name: 蓄灵丹
    sp_gain: 100
    rarity: uncommon
    stone_value: 10000
  - id: foundation_pill
    name: 筑基丹
    sp_gain: 300
    rarity: rare
    stone_value: 30000
  - id: breakthrough_pill
    name: 破境丹
    sp_gain: 1000
    rarity: epic
    stone_value: 100000
  - id: creation_pill
    name: 造化丹
    sp_gain: 5000
    rarity: legendary
    stone_value: 500000

# 突破方式
breakthrough_methods:
  natural:
    name: 常规突破
    rate_mult: 1.0
    tribulation_mult: 1.0
    conditions: []

# 突破成功率基础参数
breakthrough_params:
  base_rate: 0.60
  root_quality_bonus:
    heavenly: 0.15
    upper: 0.10
    middle: 0.05
    lower: 0.03
    waste: 0.00
  qi_density_bonus:
    depleted: -0.20
    thin: -0.10
    normal: 0.0
    dense: 0.05
    spirit_eye: 0.10
    fairy_qi: 0.12
    immortal_qi: 0.15
    chaos_qi: 0.20
  min_rate: 0.10
  max_rate: 0.95

# 突破结果
breakthrough_results:
  great_success:
    threshold: 0.80
  success:
    threshold: 0.0
  minor_failure:
    sp_loss: 0.30
    cooldown_days: 7
  major_failure:
    sp_loss: 0.50
    cooldown_days: 30

# 冷却时间（天）
breakthrough_cooldown:
  major:
    - { min_order: 0, max_order: 3, days: 30 }
    - { min_order: 4, max_order: 5, days: 90 }
    - { min_order: 6, max_order: 8, days: 180 }
    - { min_order: 9, max_order: 13, days: 365 }

# ═══════════════════════════════════
# 道韵系统（第二维度）
