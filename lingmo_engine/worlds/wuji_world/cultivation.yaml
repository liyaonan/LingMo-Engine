  - {id: thin,         name: 稀薄,     range: [0.15, 0.35], cultivation_speed_mult: 0.6, can_breakthrough: false, breakthrough_bonus: -0.10}
  - {id: normal,       name: 正常,     range: [0.35, 0.55], cultivation_speed_mult: 1.0, breakthrough_bonus: 0.0}
  - {id: dense,        name: 浓郁,     range: [0.55, 0.75], cultivation_speed_mult: 1.5, breakthrough_bonus: 0.05}
  - {id: spirit_eye,   name: 灵眼,     range: [0.75, 0.95], cultivation_speed_mult: 2.5, breakthrough_bonus: 0.10}
  - {id: fairy_qi,     name: 灵液化,   range: [0.95, 1.5],  cultivation_speed_mult: 4.0, breakthrough_bonus: 0.12}
  - {id: immortal_qi,  name: 仙气,     range: [1.5, 3.0],   cultivation_speed_mult: 6.0, breakthrough_bonus: 0.15}
