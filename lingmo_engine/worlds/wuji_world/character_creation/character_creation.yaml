      race: "human"
      personality: "散功后记忆残缺，像一本被撕掉大半页的书。知道自己曾是大罗金仙，但只剩概念没有实感。嗜酒如命的习惯还在，洒脱依旧但底色变了——以前是看透一切的洒脱，现在是什么都没看过的天真。偶尔下意识做出精妙之事。"
      tags: ["散修", "符修", "阵修", "豁达", "凡人", "记忆缺失"]
      background: "{player_name}是仙界少有的大罗金仙散修，道号青帝。但'大罗金仙'对他来说只是概念——散功封印灵力时，附着在灵力上的记忆随之剥离。他知道自己做过一件事：在第九次金仙劫中将毕生灵力封入十二枚焚炎符。知道这是自己选的——但为什么，想不起来了。不记得出身、修炼历程、任何同伴。偶尔梦到模糊人影，醒来后抓不住。如今以潦倒散修醉鬼的身份游荡于人界，喝酒、观星、帮帮后辈。不焦虑——也许曾经很急迫，但他不记得了。"
      hobbies: "喝酒、观星推演天道规律、制符实验（他称之为'画画'）、布阵自娱、混沌虚空漫游"
      summary: "李云霄，道号青帝，散功归凡，十二符藏于识海"
      age: 113730
      birthday: "84917/3/3"
      appearance: "看似四十余岁中年男子。面容清俊，鬓角几缕白发来历不明——不记得是什么留下的。指尖长年制符留下的薄茧还在，但他不记得自己练过符。身形修长，站姿松松垮垮，像卸下了千钧重担——虽然他不记得那些重量。最常做的动作是摘下酒葫芦灌一口，然后咧嘴一笑。偶尔会不自觉地用手指在空中画符——线条精准得不像凡人——但他自己没注意到。"
      clothing: "宽松青灰长衫，腰系旧绳，绳上挂一只磨得发亮的酒葫芦。无冠散发，发尾绑一截青布条。脚踩磨损布履，全身上下找不出一件像样法宝。看起来就是个潦倒散修——但他自己也不确定从前是不是真的潦倒。"
      faction: ""
      faction_rank: "潦倒散修"
      relationships: {}
      opening_text: "你睁开眼。\n\n溪水冰凉，漫过半边脸颊。\n\n你不记得自己是怎么到这里的——事实上，你什么都不记得。脑子里只有几个碎片：你叫{player_name}，道号青帝。你曾经是大罗金仙——但'大罗金仙'四个字空洞得像在念别人的名字。你在第九次金仙劫中做了某件事，把灵力封进了十二张符里。这是你自己选的，但为什么，不知道。\n\n除此之外，一片空白。\n\n你扎着坐起来。身体沉重得不像话，灵力一丝也无。指尖有薄茧，像是常年做过什么精细活计——但你不记得。识海深处似乎有什么东西在沉睡，模糊而灼热，你隐约感觉得到，但碰不到。\n\n腰间挂着一壶酒，味道熟悉得让人鼻酸。你拔开塞子灌了一口，散仙醉入喉，辛辣而回甘。\n\n这是你唯一确定属于自己的东西。\n\n远处传来鸡鸣犬吠，炊烟袅袅——一个凡人的小镇。\n\n你晃了晃酒壶，咧嘴一笑。\n\n从零开始，也没什么不好。\n\n反正也不记得以前是什么样了。"
      opening_text_dark: "你睁开眼。\n\n溪水漫过半边脸颊。凉的。石头硌着后背，你不知道自己躺了多久。\n\n脑子里只有几个碎片。名字，道号。大罗金仙——四个字空洞得像在念别人的。你在第九次金仙劫中做了某件事，把灵力封进了十二张符。是你选的。\n\n为什么，想不起来了。\n\n坐起来。身体沉重，灵力一丝也无。指尖有薄茧，右手在空中画了一下——线条精准得不像随手画的。但你不知道自己在画什么。\n\n腰间一壶酒。味道熟悉。你拔开塞子喝了一口，安静了一点。不是因为好喝。是因为这个味道让脑子里那些嗡嗡的东西停了一会。\n\n远处有鸡叫。炊烟。一个凡人的小镇。\n\n你站起来。身体记得怎么走路。"

# === 表单字段定义 ===
# type: text / select / textarea / multi_select
# routes: 为空则所有路线显示，指定则仅对应路线显示
# 供前端创建页面渲染使用（前端改造暂不做）
fields:
  # --- 共通字段 ---
  - key: name
    label: "姓名"
    type: text
    required: true
    placeholder: "输入你的名字"

  - key: narrative_style
    label: "叙事风格"
    type: select
    required: true
    options:
      - value: carefree
        label: "逍遥修仙"
        description: "传统仙侠，壮丽恢宏，快意恩仇"
      - value: dark
        label: "黑暗修仙"
        description: "残酷世界，克制留白，在平常中发现不安"

  # --- 人界篇独有字段 ---
  - key: gender
    label: "性别"
    type: select
    required: false
    options:
      - value: male
        label: "男"
      - value: female
        label: "女"
      - value: unknown
        label: "未知"

  - key: personality
    label: "性格"
    type: select
    required: false
    routes: [mortal_realm, spirit_realm]
    options:
      - value: "心志坚定的求道者"
        label: "坚定"
      - value: "沉静内敛，喜怒不形于色"
        label: "沉静"
      - value: "豪爽直率，快意恩仇"
        label: "豪爽"
      - value: "冷酷无情，唯我独尊"
        label: "冷酷"
      - value: "温和敦厚，与人为善"
        label: "温和"
      - value: "狡诈多谋，善于算计"
        label: "狡诈"
      - value: "善良仁慈，心怀天下"
        label: "善良"

  - key: appearance
    label: "外貌"
    type: textarea
    required: false
    placeholder: "描述角色的外貌特征，如容貌、体型、发色等（可选）"
    rows: 3

  - key: clothing
    label: "衣着"
    type: textarea
    required: false
    placeholder: "描述角色的穿着打扮、服饰风格等（可选）"
    rows: 3

  - key: spiritual_roots
    label: "灵根"
    type: multi_select
    required: false
    routes: [mortal_realm]
    min: 1
    max: 5
    options:
      - value: metal
        label: "金"
      - value: wood
        label: "木"
      - value: water
        label: "水"
      - value: fire
        label: "火"
      - value: earth
        label: "土"

  - key: cultivation_path
    label: "修炼方向"
    type: select
    required: false
    routes: [mortal_realm]
    options:
      - value: sword
        label: "剑修"
      - value: magic
        label: "法修"
      - value: body
        label: "体修"
      - value: talisman
        label: "符修"
      - value: formation
        label: "阵修"
      - value: artifact
        label: "器修"
      - value: alchemy
        label: "丹修"
      - value: ghost
        label: "鬼修"
      - value: demonic_beast
        label: "妖修"
      - value: devil
        label: "魔修"
      - value: blood
        label: "血修"

  # --- 灵界篇独有字段 ---
  - key: cover_identity
    label: "掩护身份"
    type: text
    required: false
    routes: [spirit_realm]
    placeholder: "在人界的伪装身份，如：流浪药师、江湖游医、算命先生"

  # --- 仙界篇独有字段 ---
  - key: race
    label: "种族"
    type: select
    required: false
    routes: [immortal_realm]
    options:
      - value: human
        label: "人族（飞升）"
        description: "飞升仙界的人族修士，世家与散修并存"
      - value: celestial
        label: "仙族"
        description: "仙界原生种族，仙气凝聚诞生，天生亲和天道"
      - value: divine
        label: "神族"
        description: "上古遗族后裔，血脉稀薄但底蕴深厚"
      - value: demon
        label: "妖族（飞升）"
        description: "飞升仙界的妖族修士，妖仙盘踞太荒州"
      - value: heavenly_demon
        label: "天魔族"
        description: "域外混沌的入侵种族，吞噬仙气为生"
