# 无极 — 角色创建
title: "创建你的修仙者"

routes:
  - id: mortal_realm
    title: "人界篇"
    subtitle: "凡人 · 灵根测试"
    chapter: "第一章"
    description: "凡人修仙，漫漫仙途从此始"
    locked: false
    template_id: "renjie_fanren"
    narrative_badge: "凡人 · 初入修仙"
    narrative_text:
      - "你出生在青石镇，沧澜域边缘一个不起眼的凡人小镇"
      - "末法时代，这里灵气稀薄到连庄稼都长不好"
      - "十六年来，你和镇上的其他孩子一样——帮父亲打猎、听老人讲修仙传说"
      - "修仙？那是传说中的事"
      - ""
      - "直到今天"
      - "一位天道剑宗长老路过小镇，设下灵根测试法阵"
      - "你被测出拥有修仙灵根"
      - ""
      - "远处传来消息——沧澜域废灵脉开始冒泡了"
      - "灵气在回来"
      - "没人知道这意味着什么"
      - ""
      - "修仙之路，由此启程"
    narrative_text_dark:
      - "青石镇三年没下过透雨了"
      - "田里的庄稼年年矮一截，今年连种子都没收回"
      - "有人说修仙者偷走了天地的灵气。你不太懂这些。你只知道从记事起，井水就是苦的"
      - ""
      - "今天镇上来了个人"
      - "穿白衣，踩着不沾泥的鞋"
      - "他说要测灵根"
      - "你不知道灵根是什么。但镇上的老人都站在自家门口看着，没人出来"
      - ""
      - "法阵亮了。他看了你一眼，点了点头"
      - "旁边的师兄松了口气"
      - ""
      - "远处传来消息——废灵脉冒泡了"
      - "老人们把门关上了"
    narrative_highlights: ["灵根测试", "修仙灵根", "天道剑宗", "末法时代", "灵气复苏", "站直了"]
    narrative_meta: "当前境界: 凡人  ·  起始地点: 沧澜域·青石镇"

  - id: spirit_realm
    title: "灵界篇"
    subtitle: "幻术 · 暗线密探"
    chapter: "第二章"
    description: "紫微姬氏密探，法修鬼道双绝\n奉命搜寻天感灵童，灵界暗流涌动\n命运的讽刺，将改写你的一切"
    locked: false
    template_id: "lingjie_mishi"
    narrative_badge: "灵界密探 · 炼虚初期"
    narrative_text:
      - "你是紫微姬氏的影子"
      - "数百年暗线生涯，幻术与鬼道双修"
      - "在灵界以数十种身份来去自如"
      - ""
      - "姬氏传来了新的密令——"
      - "灵界出现了天感灵童"
      - "这种天赋能直接感知天道意志"
      - "若被灵界各族知晓，姬氏的棋局将被一个孩子看穿"
      - ""
      - "你的任务：在天感觉醒之前找到她"
      - "带回仙界……或就地抹杀"
      - ""
      - "灵界暗流涌动，种族矛盾一触即发"
      - "而你即将发现，命运的讽刺远超想象"
    narrative_text_dark:
      - "浮黎城，落尘域最大的聚落"
      - "飞升者像尘埃一样落在这里。活下来的留下来，活不下来的沉到底层"
      - "你在浮黎城待了三百年"
      - ""
      - "姬氏的玉简便短：灵界出现了天感灵童"
      - "带回仙界。或者就地处理"
      - ""
      - "这不是你第一次接到这种命令"
      - "上一个目标是个炼气期的散修。你记得那天的茶不错"
      - ""
      - "天感——能直接感知天道意志"
      - "如果被各族知道，仙界在这边的棋局就没什么意思了"
      - "你把玉简捏碎"
      - "该出发了"
    narrative_highlights: ["紫微姬氏", "天感灵童", "暗线任务", "灵界", "炼虚期"]
    narrative_meta: "当前境界: 炼虚初期  ·  主修: 法修（幻术）  ·  辅修: 鬼道  ·  起始地点: 灵界·浮黎城"

  - id: immortal_realm
    title: "仙界篇"
    subtitle: "散功归凡 · 从零开始"
    chapter: "第三章"
    description: "你曾是三界之巅的大罗金仙\n如今以凡人之躯醒来，记忆残缺\n识海深处封着十二枚足以改变三界的焚炎符\n但你不知道它们有多强"
    locked: false
    template_id: "xianjie_daluo"
    narrative_badge: "凡人 · 散功归凡"
    narrative_text:
      - "你不记得自己是怎么到这里来的"
      - "醒来时躺在一条溪边，浑身湿透"
      - "脑子里只有几个碎片——"
      - "你的名字，你的道号"
      - "你曾经是大罗金仙"
      - ""
      - "除此之外，一片空白"
      - "不记得出身，不记得过去，不记得任何一个人"
      - ""
      - "偶尔梦到模糊的人影"
      - "一个沉默的，一个大笑的，一个点头的，一个低语的"
      - "醒来后什么都抓不住"
      - ""
      - "腰间挂着一壶酒，味道很熟悉"
      - "这是你唯一确定属于自己的东西"
    narrative_text_dark:
      - "你睁开眼"
      - "溪水漫过半边脸颊。凉的"
      - ""
      - "你不记得怎么到的这里。事实上什么都不记得"
      - "只有几个碎片：名字。道号。曾经是大罗金仙"
      - "但这四个字空洞得像在念别人的名字"
      - ""
      - "腰间一壶酒。味道熟悉"
      - "喝了一口。安静了一点"
      - ""
      - "远处有鸡叫"
      - "你站起来"
      - "身体记得怎么走路"
    narrative_highlights: ["散功归凡", "记忆缺失", "十二焚炎符", "凡人", "从零开始"]
    narrative_meta: "当前境界: 凡人（散功归凡）  ·  起始地点: 青云镇"

