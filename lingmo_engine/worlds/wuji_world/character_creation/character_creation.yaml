      personality: "{personality}。数百年暗线生涯把多余的情感磨得干干净净，冷静是本能，伪装是呼吸。能在十种身份之间无缝切换，却偶尔在某个身份里停留过久——不是忘了自己是谁，是偶尔也需要片刻不用演。对任务毫不犹豫，但会在杀死目标后把对方的遗物整理好。没人知道这是怜悯还是习惯。"
      tags: ["修仙者", "灵界", "幻术师", "密探"]
      background: "{player_name}是紫微姬氏的暗线代理人，专精幻术与心灵类法术，辅修鬼道。数百年间在灵界以数十种身份潜伏，操控种族矛盾、刺探情报、抹杀目标。今日接到姬氏密令：灵界出现了天感灵童，这种天赋若被各族知晓将危及姬氏棋局。必须在天感觉醒之前找到她。"
      hobbies: "收集各族情报碎片、推演幻术微小变化、以不同身份混迹各域集市"
