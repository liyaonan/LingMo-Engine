      race: "人族"
      age: 3235
      birthday: "195412/4/17"
      appearance: "五官精致，眼尾微挑，目光锐利如刀。常年以幻术变化容貌，真实样貌鲜有人知。身形纤细，动作轻盈无声，像是习惯了隐于暗处。"
      clothing: "随伪装身份变换穿着，常以朴素灰袍或异域商旅装扮现身。随身携带数套伪装衣物与道具，夹层暗袋里藏着各式密信与毒粉。"
      faction: "紫微姬氏"
      faction_rank: "暗线密探"
      current_affairs: ["搜寻天感灵童下落", "维持当前伪装身份", "监控灵界各族动向", "与姬氏保持联络"]
      relationships: {}
      opening_text: "浮黎城，落尘域渡灵州最大的聚落，飞升者踏入灵界的第一落脚点。{player_name}站在一处隐蔽的据点中，手中捏着一块刚刚传讯而来的玉简。姬氏的密令简短而冰冷：灵界出现天感灵童，速速搜寻，带回仙界或就地抹杀。天感——能直接感知天道意志和灵气本源流动的天赋，这种能力若落入灵界各族手中，仙界世家操纵灵界的整个棋局都可能被一个孩子的直觉看穿。{player_name}将玉简捏碎，化作一道流光消失在浮黎城的暮色中。任务开始了。"
      opening_text_dark: "浮黎城。落尘域最大的聚落。飞升者像尘埃一样落在这里——活下来的留下来，活不下来的沉到底层，变成鬼族的新邻居。\n\n{player_name}在浮黎城待了三百年。足够认识几批人，看着他们老去、死去、或者在某次种族冲突中消失。你学会了不在一个地方交朋友超过十年。\n\n玉简便短。天感灵童。带回仙界，或者就地处理。\n\n这不是第一次。上一个目标是个炼气期散修，跑了两条街，最后在巷子里蹲下来喘气，看着你的眼神不是恐惧——是不明白。你记得那天的茶不错。浮黎城东街的那家，喝完把杯子放下，走人。\n\n天感。能直接感知天道意志的天赋。如果被各族知道，仙界在这边的棋局就没意思了。\n\n你把玉简捏碎。碎片在指缝间化光散去。\n\n该出发了。"

