      personality: "{personality}。独活大半年磨出了远超同龄人的沉稳，但骨子里还是那个追着兔子满山跑的少年。不服输是刻在骨头里的——父亲教过他，山里遇到猛兽不能跑，跑了就是死。他对陌生人警惕，认准了的人就掏心掏肺。嘴上不说，但会把最好的猎物挂在人家门口。"
      tags: ["修仙者"]
      background: "{player_name}来自沧澜域青石镇，猎户之子。末法时代边陲小镇，灵气稀薄到庄稼都长不好。七岁丧母——灵气枯竭引发瘟疫，药石无医。十五岁丧父——冬日进山打猎，冻饿交加再没回来。独活大半年，靠父亲的猎户本事勉强没饿死。十六岁被路过天道剑宗长老发现中品灵根，收入外门。天道剑宗建在古剑冢残剑之上，据说那里埋着远古剑修的遗泽。修仙之路，由此启程。"
      hobbies: "偷偷去宗门后山探险、追着师兄问修仙界传闻、跟同门比谁跑得快"
      summary: "沧澜域青石镇猎户孤儿，中品灵根，热血不服输"
      race: "人族"
      age: 16
      birthday: "198631/11/23"
      appearance: "身材偏瘦但筋骨结实，肤色偏深，手有粗茧。黑色短发随意扎着，总有几缕不服帖地翘起来。额角一道幼年摔伤的浅疤。五官普通，但笑起来露出一排白牙，看着就让人觉得这人靠得住。"
      clothing: "入宗前穿打补丁的青灰短褂，草鞋。入宗后换素白外门道袍，动不动就撸袖子。道袍下摆被他偷偷剪短了半寸——'碍事'。"
      faction: ""
      faction_rank: ""
      relationships: {}
      opening_text: "青石镇，沧澜域边缘一个不起眼的凡人小镇。末法时代，这里灵气稀薄到连庄稼都长不好，修仙是传说中的事。{player_name}站在灵根测试法阵前，手心全是汗。周围是来看热闹的镇民，有人窃笑，有人摇头。法阵亮了。天道剑宗长老捋须而笑：'不错，中品灵根。'远处传来消息——沧澜域废灵脉开始冒泡了。灵气在回来，没人知道这意味着什么。修仙之路，由此启程。"
      opening_text_dark: "青石镇。沧澜域最东边的一个地方。三年没下过透雨。田里的庄稼年年矮一截，今年连种子都没收回。你不太懂修仙是什么。从记事起井水就是苦的，镇上人走了一半，剩下的不走不是因为舍不得——是没地方去。\n\n今天来了个穿白衣的人。踩着不沾泥的鞋，在镇口摆了个阵。说测灵根。\n\n你不知道灵根是什么。\n\n法阵亮了。他看了你一眼，点了点头。旁边的师兄松了口气。不知道他松的是什么气。\n\n远处传来消息，废灵脉冒泡了。灵气回来了。\n\n镇上的老人把门关上了。"

