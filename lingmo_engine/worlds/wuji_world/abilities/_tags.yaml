# ═══════════════════════════════════════
# 无极世界 — 技能标签定义
# ═══════════════════════════════════════
#
# 标签用于：LLM 创建技能时的合法标签校验、战斗 tag_rules 修正、提示词注入。
# 每个标签组包含一组语义相关的标签，LLM 创建技能时每个组内可多选。

tag_groups:
  - id: combat_style
    name: "战斗方式"
    tags: [剑, 近战, 远程, 范围]

  - id: cultivation_path
    name: "修炼道路"
    tags: [法术, 体术, 符箓, 阵法, 法宝, 丹药]

  - id: dark_path
    name: "邪道"
    tags: [鬼术, 灵魂, 妖术, 魔功, 血术, 变身]

  - id: function
    name: "功能"
    tags: [治疗, 增益, 减益, 伤害, 吸血, 穿透, 防御, 净化, 控制]

  - id: element
    name: "元素"
    tags: [金, 木, 水, 火, 土, 雷, 冰, 风]

# ═══ 技能 Tag → 消耗资源映射 ═══
# 神通(category=divine)只消耗灵力(spiritual_power)，不查此表。
# 非神通根据 tags 匹配以下资源，一个技能可同时匹配多种。
# 无匹配 tag 时默认消耗神识(divine_sense)。
tag_cost_map:
  stamina: [近战, 体术, 变身]
  divine_sense: [远程, 法术, 符箓, 阵法, 法宝, 丹药, 鬼术, 灵魂, 魔功, 血术]
