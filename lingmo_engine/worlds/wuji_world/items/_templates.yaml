# ═══════════════════════════════════════
# 消耗品实体 Schema — LLM 生成消耗品时必须包含的字段
# ═══════════════════════════════════════
#
# summary 字段用于实体查询索引，供 LLM 快速判断是否需要查询详情。
# 必须简洁精准，不超过 30 字，突出物品的核心功能和用途。
#
# ═══ 消耗品实体 Schema（保留，LLM 提示引用） ═══
__entity_schema__:
  id: "consumable_xxxxxxxx"
  name: "回春丹"
  summary: "丹药，恢复大量生命值"
  category: "consumable"
  description: "以上等灵草炼制..."
  rarity: 45
  sell_price: 30
  combat_only: true
  effects:
    - {type: heal, power: 0.8, target: self}
  tags: [丹药, 治疗]

# ═══ 装备实体 Schema（保留） ═══
