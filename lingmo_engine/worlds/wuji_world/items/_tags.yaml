# ═══════════════════════════════════════
# 无极世界 — 物品标签定义
# ═══════════════════════════════════════
#
# 标签用于：LLM 创建消耗品时的合法标签校验、装备 tag 展示、装备条件限制、提示词注入。
# 每个标签组包含一组语义相关的标签。

tag_groups:
  - id: item_type
    name: "物品种类"
    tags: [丹药, 符箓, 阵法, 法宝, 灵石, 灵草, 秘宝]

  - id: function
    name: "功能"
    tags: [治疗, 增益, 减益, 伤害, 吸血, 穿透, 防御, 净化, 青帝]

  - id: element
    name: "元素"
    tags: [金, 木, 水, 火, 土, 雷, 冰, 风]

  - id: usage
    name: "用途"
    tags: [突破, 修炼, 恢复, 解毒]

  - id: equipment_type
    name: "装备类型"
    tags: [法宝, 冠饰, 面具, 法袍, 仙裙, 灵袜, 仙履, 戒指, 项链]

  - id: weapon_style
    name: "兵器样式"
    tags: [刀, 剑, 枪, 杖, 环, 琴]

  - id: material
    name: "材料属性"
    tags: [骨骼, 草木, 妖丹, 血肉, 羽毛, 皮甲, 灵液, 矿石, 灵核, 锋锐]
