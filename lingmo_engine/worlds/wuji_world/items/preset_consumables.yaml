# ═══════════════════════════════════════
# 无极世界 — 预设消耗品定义
# ═══════════════════════════════════════
#
# 通用消耗品模板，服务于商店/初始背包/战利品等多种场景。
# 统一玄妙级（rarity=50），stat 基准 50。
# 等级缩放由 creator_stats.level 驱动，效果参数全等级一致。
#
# 符箓：攻击/减益/控制，消耗神识
# 丹药：治疗/增益/恢复，无使用代价

preset_consumables:

  # ── 符箓 ──────────────────────────────

  # ── 凡品 ──

  - id: pc_talisman_atk_lv0
    name: 火弹符
    summary: "凡品攻击符箓，造成灵力伤害"
    category: consumable
    rarity: 50
    sell_price: auto
    combat_only: true
    costs:
      - resource: divine_sense
        amount: 2
    creator_stats:
      level: 0
      vitality: 50
      stamina: 50
      force: 50
      tenacity: 50
      agility: 50
      divine_sense: 50
    effects:
      - type: damage
        target: enemy
        power: 2.0
    tags: [符箓, 伤害]
    description: "以灵力激发的攻击符箓，对目标造成灵力伤害。"

  - id: pc_talisman_debuff_lv0
