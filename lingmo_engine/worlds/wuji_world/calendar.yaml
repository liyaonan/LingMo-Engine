# 无极日历 — 五劫纪
# 天地灵气恒量，修炼即掠夺，飞升即窃取，天劫即天道收债
# 五大纪元以天地劫难为界，每一劫都是灵气格局的剧变
type: default
days_per_month: 30
months_per_year: 12

# 十二月令 — 仙侠四季
# 供叙事使用，代码显示仍为"X月"格式
month_names:
  - "孟春"    # 1月  春寒料峭，万物萌动
  - "仲春"    # 2月  百花初绽，灵药吐芳
  - "季春"    # 3月  春意阑珊，生机最盛
  - "孟夏"    # 4月  暑气初盛，火行渐旺
  - "仲夏"    # 5月  日照当空，阳极之月
  - "季夏"    # 6月  酷暑方浓，雷劫多发
  - "孟秋"    # 7月  凉风初至，金气渐盛
  - "仲秋"    # 8月  秋月朗朗，灵气澄澈
  - "季秋"    # 9月  秋风萧瑟，万灵收敛
  - "孟冬"    # 10月 寒霜初降，水行渐旺
  - "仲冬"    # 11月 大雪封山，万物蛰伏
  - "季冬"    # 12月 岁末严寒，天地闭藏

# 五劫纪 — 灵气大循环的五大劫难
eras:
  - name: "鸿蒙劫"
    start_year: 1
    span: 10000
    qi_level: "极盛"
    description: "天地初开，灵气充沛如海，万灵未生灵智。混沌中蕴含无尽造化，修仙之道尚未现世。此纪末，首批生灵觉醒灵智，开始吞吐天地灵气——掠夺的第一口。"

  - name: "天衍劫"
    start_year: 10001
    span: 28000
    qi_level: "充盈→衰减"
    description: "修仙之道始现，首批大能崛起。飞升者第一次带走灵气，天劫第一次降世——此后三界灵气永不复初。"

  - name: "灵衰劫"
    start_year: 38001
    span: 34000
    qi_level: "衰减→稀薄"
    description: "修士数量爆发，飞升频繁。灵气衰减加速，宗门体系建立以争夺残余灵脉。首次大能陨落反哺带来短暂繁荣，但新飞升者掠夺更快。灵界种族战争初现端倪。"

  - name: "末法劫"
    start_year: 72001
    span: 36000
    qi_level: "稀薄→枯竭"
    description: "末法前兆。人界灵气持续走低，宗门争夺白热化。灵界种族战争全面爆发，仙界世家开始系统操纵下界。多次大能陨落反哺均被新飞升者迅速吸干。太昊于末法劫后期证道大罗金仙，青帝于末法劫末期至寂灭劫初证道大罗。"

  - name: "寂灭劫"
    start_year: 108001
    qi_level: "枯竭→微苏"
    description: "末法时代。人界灵气枯竭至极，唯有灵脉所在可修炼。大罗金仙陆续陨落，灵气开始微弱复苏。破晓前的至暗时刻——希望比绝望更能激发杀意。"

# 时段词 — 仙侠诗意风格（LLM 从中选择更新）
time_of_day_options:
  - 拂晓       # 天将明未明
  - 晨曦       # 朝阳初升
  - 日昇       # 旭日高悬
  - 正午       # 日照当空
  - 日昃       # 日偏西斜
  - 日暮       # 夕阳西沉
  - 薄暮       # 暮色渐浓
  - 入夜       # 夜幕初降
  - 夜阑       # 夜深人静
  - 子夜       # 午夜时分
  - 残夜       # 夜将尽未尽
  - 灯火       # 掌灯时分

# 初始状态 — 近古纪末期，金仙陨落、灵气微苏的转折时刻
start_year: 198647
start_month: 3
start_day: 1
start_time_of_day: "晨曦"
