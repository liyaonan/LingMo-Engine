world:
  name: "无极"
  title: "无极"
  description: >
    大千世界之下，三界并立。一片被天道法则笼罩的宏大修仙世界。
    凡人修士吸纳天地灵气，从练气到飞升，追寻大道。
    人界、灵界、仙界层层递进，十一道修炼之路殊途同归。

entity_query:
  fuzzy_threshold: 5
  cache_size: 30
  type_thresholds:
    ability: 3
    item: 5
    character: 3

map:
  hierarchy: ["大千世界", "界", "域", "州", "城镇,福地,副本", "建筑,设施"]
  scale: 10
  visibility_multiplier: 4
  independent_roots: true

