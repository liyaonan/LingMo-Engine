# 预设模板：LLM 快速生成 NPC/怪物的骨架
# template_id + 少量参数即可创建角色，无需组装完整 YAML

templates:
  - id: human_cultivator
    name: "人族修士"
    description: "人族修仙者，适用于任何场景。商人、散修、宗门弟子、长老等。"
    char_type: npc
    aptitude_bias:
      force: 1.0
      tenacity: 1.0
      agility: 1.0
      divine_sense: 1.2
      stamina: 0.8
    default_tags: ["人族"]
    skill_pools:
      tag_elements:
        剑修: ["金"]
        法修: ["水", "火"]
        体修: ["土"]
        符修: ["木", "火"]
        阵修: ["土", "风"]
        器修: ["金", "火"]
        丹修: ["火", "木"]
        鬼修: ["水", "冰"]
        魔修: ["火", "冰"]
        血修: ["火", "土"]
      fixed: []
      fallback: [ability_slash]

  - id: beast_monster
    name: "妖兽"
    description: "野生妖兽，适用于野外遭遇、洞窟探索等战斗场景。"
    char_type: monster
    aptitude_bias:
      force: 1.3
      tenacity: 1.2
      agility: 1.1
      divine_sense: 0.5
      stamina: 1.2
    default_tags: ["妖兽"]
    skill_pools:
      tag_elements: {}
      fixed: []
      fallback: [ability_slash]

  - id: demon_cultivator
    name: "邪修"
    description: "修习禁忌功法的修士，适用于反派、暗线剧情。"
    char_type: npc
    aptitude_bias:
      force: 1.1
      tenacity: 0.9
      agility: 1.0
      divine_sense: 1.1
    default_tags: ["邪修"]
    skill_pools:
      tag_elements:
        魔修: ["火", "冰"]
        血修: ["火", "土"]
        鬼修: ["水", "冰"]
      fixed: []
      fallback: [ability_slash]

  - id: spirit_beast
    name: "灵兽"
    description: "有灵智的仙兽，适用于宠物、坐骑、守护兽等场景。"
    char_type: pet
    aptitude_bias:
      force: 1.1
      tenacity: 1.1
      agility: 1.2
      divine_sense: 0.8
    default_tags: ["灵兽"]
    skill_pools:
      tag_elements: {}
      fixed: []
      fallback: [ability_slash]

  - id: artifact_spirit
    name: "器灵"
    description: "法宝孕育的灵体，适用于神器剧情、秘境守护等场景。"
    char_type: npc
    aptitude_bias:
      force: 0.7
      tenacity: 0.8
      agility: 1.0
      divine_sense: 1.5
    default_tags: ["器灵"]
    skill_pools:
      tag_elements:
        器修: ["金", "火"]
      fixed: []
      fallback: [ability_slash]

