# --- 黑帝·渊寂 ---
# 五色帝之三，水行法修/鬼修，半人半鬼混血，潜伏灵界冥渊记录一切
- id: 33
  name: "渊寂"
  dao_name: "黑帝"
  hobbies: "记录灵气流动规律、观察种族矛盾、沉默（这是他主要的交流方式）"
  summary: "黑帝·渊寂，水行法修/鬼修，半人半鬼混血，潜伏灵界冥渊观察一切"
  char_type: npc
  race: "混血"
  gender: "male"
  age: 135800
  birthday: "62847/10/19"
  is_alive: true
  level: 13
  personality: "深不可测，但不是刻意神秘——是真的不知道怎么表达。他看到的东西太沉重，语言变得极其精简。五帝中话最少，但每一句都经过深思熟虑。对白帝之死怀有毕生愧疚——他在场未援手，判断出手代价过大，但理性无法消解愧疚。带着赤帝遗言玉简等了超过四万年，在等青帝恢复到足以接收这些信息的时候。"
  appearance: "身形瘦削，面容苍白如纸，双目漆黑如渊——看不到瞳孔与眼白的界限。周身笼罩着一层淡淡的雾气，那是水行灵力与鬼道气息交织的外在表征。半透明的影子偶尔与身体分离——半人半鬼的体质让他在生者与死者的世界之间自由行走。"
  clothing: "黑色长袍，面料是冥渊特产的幽水丝，在暗处泛着微弱的蓝色荧光。不戴任何配饰，唯一随身之物是一面碎片状的古镜——天渊镜的碎片，能记录并回放灵气流动。行走于冥渊时如鱼得水，身影在阴影中若隐若现。"
  tags: ["大罗金仙", "法修", "鬼修", "五色帝", "沉默", "潜伏", "混血"]
  background: "灵界鬼族与人族混血。半人半鬼，天生同时看到生者与死者的世界，对灵气本质有独到感悟。少年时被两族排斥，独自在灵界冥渊边缘修炼。证道大罗后天渊镜大成，可感知三界灵气大规模流动。苍冥赌局中押注'看清天劫的一切规则，找到漏洞'。白帝陨落时他在场，判断出手代价过大未援手——此事成为毕生愧疚。赤帝陨落后（~157,000年），离开仙界潜入灵界冥渊，以鬼族'渊老'身份混入冥渊长老会。以天渊镜碎片记录灵界种族矛盾、仙界操纵手法、灵气复苏规律，将信息封入碎片藏于灵界各处。他知道青帝还活着——青帝散功时的大罗级灵力海啸逃不过他的感知。他带着赤帝遗言玉简等了超过四万年，不确定一个失忆的凡人能否承受玉简中的信息。"
  faction: ""
  faction_rank: "冥渊长老（伪装）"
  location: "大千世界/灵界/万劫域/幽冥州/冥渊深处"
  current_affairs: ["以'渊老'身份参与冥渊长老会", "用天渊镜碎片记录灵界真相", "等待青帝恢复修为后传递赤帝遗言", "暗中保护灵界天感灵童相关线索"]
