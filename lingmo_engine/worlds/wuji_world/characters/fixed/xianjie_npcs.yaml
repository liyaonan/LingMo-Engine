  tags: ["大罗金仙", "丹修", "法修", "丹霞", "狡诈", "渡劫", "财权"]
  background: "姜氏掌握仙界经济命脉：灵晶矿脉七成产出、太古丹炉、万宝仙市。最核心的产品不是灵石或丹药，是依赖——让所有人离不开姜氏。续命丹是仙帝命脉，疗伤药是嬴氏仙军必需品，资源是姬氏暗探血液。没有人敢真正得罪姜氏。第九次金仙劫中仙帝一次消耗三百颗续命丹——姜氏三代积蓄化为乌有。姜归墟面带微笑交付了，回去后独坐空荡丹房沉默三天。他开始秘密研究：有没有不用续命丹就能渡过天劫的方法？"
