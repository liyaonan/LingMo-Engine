# --- 天关守将·嬴霜 ---
# 嬴破军的心腹与接班人，关在人在
- id: 20
  name: "嬴霜"
  dao_name: "霜刃"
  hobbies: "练兵（她称之为'和工作一样的事'）、铸器、研读边关战史"
  summary: "天关守将，嬴破军接班人，关在人在"
  char_type: npc
  race: "人族"
  gender: "female"
  age: 45035
  birthday: "153612/4/30"
  is_alive: true
  level: 12
  personality: "军人作风，刚硬如铁。嬴破军的影子和左臂——嬴破军在前方冲锋时，她守后方天关。对仙帝的利用深感不满但不说出口，因为抱怨不能挡住天魔。部下对她既敬畏又爱戴——敬畏她的严厉，爱戴她每次作战都冲在最前面。"
  appearance: "看似二十余岁女子，短发利落，面容刚毅不输男儿。身材高挑结实，左手腕到肘部缠着铁护臂——天魔留下的伤疤太深，需要金属片固定骨骼。目光锐利如刀，走路带风，周围人本能地让路。"
  clothing: "玄铁战甲，与嬴破军同款但更轻便——她注重机动性。腰间双刀，一长一短，长刀攻天魔，短刀近身自卫。不穿任何朝服，甚至没去过百仙朝堂——她觉得那里的人只会说话不会打仗。"
  tags: ["太乙金仙", "体修", "器修", "玄天", "刚毅", "军权"]
  background: "嬴破军的心腹，天关守将。嬴破军不在时由她全权负责边防。金系天灵根使她的体修天赋极高，以防御见长——她布下的天关防线从未被天魔突破过。嬴破军将她视为接班人培养。她知道嬴破军对天魔与金仙劫关联的怀疑，也见过独孤寒带来的情报，但选择暂不深究——因为关外的天魔不会等她想明白再进攻。"
