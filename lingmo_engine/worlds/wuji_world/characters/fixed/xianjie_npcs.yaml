  birthday: "52783/11/5"
  is_alive: true
  level: 13
  personality: "铁面无私，不苟言笑，执行仙律时冷硬如金铁。是仙界所有人最不愿得罪的人。铁面之下是深深的不安：他执行了万年仙律，比谁都清楚每条律法都是为了维护仙帝的利益而非公正。最近几年开始失眠——不是因为天劫，是因为不确定自己在守护的值不值得。"
  appearance: "中年男子，面容冷峻如刀削，不怒自威。肤色偏白，双目如冷金，不带任何温度。身穿天刑殿法袍——玄色底金纹，胸口绣天刑独角兽。走路时脚步声极轻，像审判本身悄然而至。"
  clothing: "玄色底金纹天刑法袍，头戴法冠，手持天刑权杖。法袍上每一道金纹代表一条他亲自执行的判决。从不佩戴任何装饰——法律不需要装饰。"
  tags: ["大罗金仙", "法修", "阵修", "天刑殿", "刚毅", "渡劫"]
  background: "从天刑仙官做起，以绝对公正和无情的执行力升至殿主。仙帝看重他不是因为他忠心，而是因为他可信——只按律法行事，不收买、不站队、不搞阴谋。但他知道'公正'有边界：仙帝征三千散仙当雷劫缓冲，在任何仙律下都是死罪，但没人敢审。"
