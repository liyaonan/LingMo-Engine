# --- 黄帝·坤元 ---
# 五色帝之四，土行阵修，自封修为沉入人界灵脉修复灵气
- id: 32
  name: "坤元"
  dao_name: "黄帝"
  hobbies: "种地（真的在种灵草种子）、修复灵脉枯竭处、沉默地看着灵气流动"
  summary: "黄帝·坤元，土行阵修，自封修为隐匿人界，修复灵脉"
  char_type: npc
  race: "人族"
  gender: "male"
  age: 128756
  birthday: "69891/2/8"
  is_alive: true
  level: 5
  personality: "闷到骨子里。别人说话他点头，别人争论他沉默，别人打起来他挡在中间。话极少但说到做到——他答应的事比天道律法还可靠。五帝中最不起眼也最可靠的一个，赤帝说过'老坤话少但靠得住，比你们这群嘴炮强'。对灵气和大地的感知极为敏锐。"
  appearance: "看似五十余岁农夫，面容朴拙，皮肤黝黑粗糙，像是长年被土地风吹日晒。双手宽厚，掌心有常年接触灵脉留下的土黄色纹路——那是地脉阵法的印记。身形敦实稳重，站在那里像一块岩石，给人莫名的安定感。"
  clothing: "粗布短褐，脚踩草鞋，腰系麻绳。身上没有任何修士标识，看起来就是个普通老农。唯一不同的是他走路时脚下的土地会微微震动——他在用地脉感知周围一切。"
  tags: ["化神期", "阵修", "体修", "五色帝", "沉默", "隐匿", "自封修为"]
  background: "人界散修。在灵气枯竭处站了三百年，直到感觉大地深处灵气脉动，开创'地脉阵法'——不依赖外界灵气，而是唤醒大地深处沉睡的灵脉。证道大罗后以地脉阵法名震三界。苍冥赌局中押注'天劫收的是灵气，让灵气回来'。赤帝陨落后（~157,000年），黄帝自封修为至化神期，沉入人界中州灵脉最深处。以'老坤'之名在灵脉坊市周边活动，买灵草种子种在灵脉枯竭处——是真的在种地。人界灵气从0.35回升至0.40，表面是赤帝陨落灵气回馈，实际上黄帝暗中修复功不可没。不知道青帝已散功，上一次见面是赤帝陨落后，青帝说要'回混沌虚空准备第九次金仙劫'。"
  faction: ""
