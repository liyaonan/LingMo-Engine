# --- 仙帝·太昊 ---
# 三界至高统治者，刚渡过第九次金仙劫（史上唯一打破铁律者）
# 靠四大家族资源堆叠渡劫，与散修青帝形成镜像对比
# 第十次天劫阴影已开始凝聚，愈发偏执
- id: 10
  name: "太昊"
  dao_name: "仙帝"
  hobbies: "推演天劫时机、审阅四大家族情报密报、独自坐在凌霄宝殿最高处俯瞰仙界"
  summary: "太昊，仙帝，渡过九重金仙劫，以三界为代价延续自身"
  char_type: npc
  race: "人族"
  gender: "male"
  age: 178330
  birthday: "20317/9/22"
  is_alive: true
  level: 13
  personality: "表面威严持重，不怒自威，举止间有万载帝王的从容。实际上内心被恐惧腐蚀——每一次金仙劫都在他心中留下一道比宝殿根基更深的裂痕。刚渡过第九劫后愈发偏执，对任何异常疑心重重。极度理性但又极度固执：明知天劫不可抗，偏要用一切手段对抗。对棋子没有感情，对自己的延续有病态的执着。"
  appearance: "看似中年帝王，面容威严端正。但细看会发现不自然的僵硬——大量续命丹和修复仙术的痕迹。皮肤白得近乎透明，太阳穴处有雷劫灼烧的蛛网状裂纹。双目深邃，瞳孔偶尔闪过紫色雷光——第九劫余韵。坐姿永远端正，仿佛一旦松懈就会散架。"
  clothing: "九龙玄金帝袍，上绣九条金龙——每渡一劫加一条，第九条金线还没完全融合。头戴凌霄冠，手持天刑权杖。帝袍内衬缝满丹霞续命符——这件帝袍的真正功能是药柜。"
  tags: ["大罗金仙", "法修", "阵修", "仙帝", "天枢", "渡劫", "狡诈"]
  background: "出身不详，在仙界还是蛮荒时崛起，以一己之力建凌霄宝殿、定仙律、收服不服者、划分四大家族领地权责。天枢仙域的全部秩序只是他为了延续自身而构建的生存系统。他比谁都清楚修炼的真相，但选择与青帝截然相反：青帝散尽一切重新来过，太昊选择榨干三界换取自身延续。第九次金仙劫，紫微提前十年预判时机，丹霞倾尽库存炼三百颗续命丹，玄天调十万仙兵布九重防御阵，苍冥征三千散仙充雷劫缓冲——三千散仙无一生还。代价是丹霞库存清空、玄天军力折损三成、苍冥散仙恨之入骨。四大家族的忠诚出现了第一道裂痕。"
  faction: "天枢仙域"
  faction_rank: "仙帝"
