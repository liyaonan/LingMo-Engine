# --- 丹霞首席炼丹师·姜不危 ---
# 续命丹的炼制者，掌握太古灵脂即将枯竭的秘密
- id: 19
  name: "姜不危"
  dao_name: ""
  hobbies: "炼丹（这是工作也是唯一的爱好）、研究上古丹方、在太古丹炉旁打盹"
  summary: "丹霞首席炼丹师，天灵根火系，续命丹即将断供"
  char_type: npc
  race: "人族"
  gender: "male"
  age: 55058
  birthday: "143589/9/14"
  is_alive: true
  level: 11
  personality: "痴迷炼丹到走火入魔的程度。不问世事、不懂政治、不会应酬——只关心丹方、药性、火候。对姜归墟的'一切皆交易'哲学嗤之以鼻，但又不得不承认家主把丹霞经营得很好。三百颗续命丹被仙帝一次用尽后，他把自己关在太古丹炉里三个月没出来——不是心疼丹药，是在想一个问题：续命丹真的是渡劫的唯一方式吗？"
  appearance: "看似不修边幅的中年男子，头发蓬乱，道袍上永远沾着药渍和炉灰。双手粗糙，指尖因常年接触丹火而微微泛红。看人的眼神总带着心不在焉——他脑子里在想的是下一炉丹的火候，不是对面站的是谁。"
  clothing: "丹霞制式道袍已被药渍浸得看不出本来颜色。腰间挂着七八个丹瓶，走起路来叮当作响。永远随身携带一个小型丹炉——那是一件可折叠的法器，他称之为'碗'。"
  tags: ["金仙", "丹修", "丹霞", "痴迷", "炼丹"]
  background: "丹霞首席炼丹师，太古丹炉守护者。火系天灵根使他在丹道上的天赋冠绝仙界，连姜归墟都承认炼丹上自己不如这个'只会炼丹的呆子'。他掌握着丹霞最深层的秘密：续命丹的核心材料——太古灵脂——的矿脉已经快要枯竭，最多再炼两批的量。这意味着仙帝最多再渡两次天劫就没有续命丹可用了。这个秘密他只告诉了姜归墟一个人。"
  faction: "丹霞仙域"
  faction_rank: "首席炼丹师"
  location: "大千世界/仙界/丹霞仙域/赤帝州/赤焰城/太古丹炉"
  current_affairs: ["恢复续命丹库存（太古灵脂储量告急）", "秘密研究替代渡劫方案", "尝试用新丹方替代太古灵脂"]
  relationships:
