  is_alive: true
  level: 13
  personality: "表面最温文尔雅。说话带笑，待人和善，慷慨到令人感动。实际上每句话都在计算利用价值。在他眼中一切关系都是交易，一切交易都有终止日期。不怕仙帝——因为仙帝需要续命丹。怕的是自己的天劫。三重天劫已耗尽丹霞三代库存，第四重来时，不确定还有什么可以拿来换命。"
  appearance: "看似五十余岁，面容和善，总带着三分笑意。体型微胖，给人一种富态长者的感觉——但那双眼睛在笑意之下精明如算盘珠。手指修长白净，指尖有常年炼丹留下的淡淡药香。"
