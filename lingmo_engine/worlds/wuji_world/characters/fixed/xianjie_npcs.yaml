# --- 天刑殿首席判官·陆判 ---
# 铁判，暗存敏感卷宗
- id: 21
  name: "陆判"
  dao_name: "铁判"
  hobbies: "研读仙律判例、整理案件卷宗（这是他的放松方式）、下棋"
  summary: "天刑殿首席判官，铁判，暗存敏感卷宗"
  char_type: npc
  race: "人族"
  gender: "male"
  age: 62058
  birthday: "136589/7/7"
  is_alive: true
  level: 11
  personality: "严格到近乎刻板，每一桩案件都按条文逐字执行。表面上是天刑殿最忠实的执法者，实际上内心有一道裂痕：他发现仙帝的很多行为在仙律下是死罪，但天刑殿从未对仙帝发起过调查。他问过钟离无咎一次：'殿主，如果有一天有人告仙帝，我们审不审？'钟离无咎沉默了很久，说：'先审好眼前这一桩。'"
  appearance: "看似四十余岁男子，面容方正严肃，不苟言笑。肤色偏暗，像是常年不见阳光——他在天刑殿地下档案室待的时间比外面多。走路时脊背永远笔直，像一根钉在地上的铁桩。"
  clothing: "天刑殿判官袍，黑色底红纹，比殿主的法袍简朴但同样威严。左手始终握着一卷空白卷轴——那是他的'判令'，随时准备记录判决。腰间挂一枚天刑令牌，正面刻'判'字，背面刻'法不容情'。"
  tags: ["金仙", "法修", "鬼修", "天刑殿", "刚毅", "判官"]
  background: "天刑殿首席判官，处理过仙界八成以上的重案。钟离无咎最信任的下属——因为陆判和年轻时的钟离一样，只信法律。但最近几年他开始注意到一些不对劲的规律：天刑殿调查的案件，凡是涉及仙帝核心利益的，无一例外都'证据不足'或'查无实据'。他开始私下保留一些本该销毁的案件卷宗。"
