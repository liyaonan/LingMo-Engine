  background: "姬无渊独女，天机阁副阁主。直接管理姬氏在灵界的暗探网络，姬瑶就是她一手培养并派遣的。天感灵童叛逃事件后，她主动请缨主持追捕——与其说是忠于仙帝的任务，不如说是要亲手洗清自己判断失误的污点。她比任何人都清楚姬瑶的能力和弱点，因为她曾经是姬瑶最信任的上司。"
