# --- 逍遥城城主·风九歌 ---
# 苍冥散仙威望最高者，维护散仙自由区
- id: 22
  name: "风九歌"
  dao_name: "九歌"
  hobbies: "喝酒（和青帝有得一拼）、听散仙们讲故事、研究逍遥城的阵法维护"
  summary: "逍遥城城主，苍冥实际管理者，维护散仙自由区"
  char_type: npc
  race: "人族"
  gender: "male"
  age: 52035
  birthday: "146612/3/18"
  is_alive: true
  level: 12
  personality: "豪爽洒脱，喝酒比青帝还凶，笑起来整条街都能听见。看似大大咧咧什么都不在乎，实则是苍冥最精明的人——逍遥城在他治下从不被仙帝势力渗透，也没有势力敢在逍遥城内动手。与沈牧云有默契：沈牧云的酒馆负责听消息，他负责确保消息不被外传。"
  appearance: "看似三十余岁男子，容貌潇洒，永远带着三分醉意和七分笑意。长发随意束在脑后，有几缕不服帖地垂在额前。身材高大但不威压，站在人群里像一阵风——存在感很强但不压迫。"
  clothing: "宽松的白衣，腰系青带，永远光着脚——他说鞋会妨碍他感知逍遥城地脉的震动。腰间挂一只硕大的酒葫芦，据说装的是苍冥特有的'逍遥醉'。看起来像个游手好闲的浪荡公子，但没人敢当着他的面这么说。"
  tags: ["太乙金仙", "法修", "器修", "苍冥", "豁达", "城主"]
  background: "逍遥城城主，苍冥散仙中威望最高的人。他不是靠修为服众——太乙金仙在仙界算不上顶尖——而是靠一个简单的原则：凡在逍遥城内动手者，不论身份，一律逐出苍冥。这条规矩连仙帝的暗探都不敢违反。风九歌是沈牧云当年设计四大家族体系时遗漏的一环——苍冥本来应该被纳入管辖，但沈牧云故意留了这个'漏洞'，让苍冥成为权力体系之外的缓冲区。风九歌不知道这个内情，但他直觉地维护着逍遥城的独立性。"
  faction: "苍冥仙域"
  faction_rank: "逍遥城城主"
  location: "大千世界/仙界/苍冥仙域/逍遥州/逍遥城"
