  personality: "八面玲珑，笑容永远挂在脸上，对谁都亲切热络。看起来只是个会做生意的漂亮老板娘。但醉仙楼里发生的每一场对话、每一个醉后的真言、每一笔见不得光的交易，她都记得清清楚楚。她是苍冥的信息中枢——不是因为她主动收集情报，而是因为人们总喜欢在喝酒的时候说真话。"
  appearance: "看似二十余岁女子，容貌温婉可人，一双眼睛笑起来弯如月牙。穿着打扮素雅干净，像邻家大姐姐一样让人放松警惕。但如果你仔细看她的眼睛——那双笑眼里偶尔闪过的精光，提醒你她不只是个漂亮的酒馆掌柜。"
  clothing: "素色布裙，腰系围裙，头发简单挽成一个髻，插一根木簪。打扮得就像一个普通的酒馆老板娘——毫不引人注目。唯一特别的是她脖子上的一个小瓶子——里面装着醉仙楼的招牌酒'浮白'，名字和她一样。"
  tags: ["真仙", "法修", "苍冥", "狡诈", "情报", "商人"]
  background: "醉仙楼掌柜，苍冥最大的信息汇聚点。她从不主动出售情报，但如果你问对了问题、给够了钱，她会'不经意'地提到某个有用的细节。仙帝的暗探、四大家族的眼线、散仙中的流言——最终都会流过醉仙楼的柜台。风九歌默许她的存在，因为她的信息网络反而帮逍遥城提前预警了多次渗透行动。她有一个不为人知的秘密：她是沈牧云安置在醉仙楼的'耳目'——虽然沈牧云从未直接告诉她要听什么，但她知道那位酒馆老板想让她听的东西。"
