# --- 赤帝·炎无极 ---
# 五色帝之二，火行丹修，以肉身为炉炼化天劫，第七劫丹成人亡
# age=97153 为陨落时年龄（~157,000年陨落），非当前推算年龄
- id: 31
  name: "炎无极"
  dao_name: "赤帝"
  hobbies: "炸炉（他声称每次炸炉都是一次突破）、喝酒（五帝中酒量第二）、大声笑"
  summary: "赤帝·炎无极，火行丹修，以天劫炼灵气回馈天地，第七劫丹成人亡"
  char_type: npc
  race: "人族"
  gender: "male"
  age: 97153
  birthday: "59847/4/11"
  is_alive: false
  level: 13
  personality: "狂傲而真诚，说话声音洪亮，笑起来能掀房顶。五帝中脾气最暴、人缘最好——从不记仇，因为忘得快。与青帝是酒友兼损友，两人见面必喝，喝完必吵，吵完继续喝。对自己的道充满信心——天劫的雷电不过另一种火，既然是火，他就能炼。"
  appearance: "身形魁梧，面容豪迈，赤红色长发如火焰般竖立。肤色黝黑偏红，双手粗糙布满丹火灼痕——那是炼丹万年的勋章。双目赤红，瞳孔中有火焰跳动。笑起来整张脸都在发光，像一颗小型太阳。"
  clothing: "赤色宽袍，袖口和下摆烧得参差不齐——不是不修边幅，是炸炉太频繁。腰间挂一只巨型丹炉（可折叠法器，比姜不危的'碗'大三倍）。赤脚走路，脚印会留下淡淡的焦痕——丹火外溢，收不住。"
  tags: ["大罗金仙", "丹修", "法修", "五色帝", "豪爽", "已陨落"]
  background: "人界飞升散修丹师。在人界灵气稀薄时靠炸炉灵气反噬强行吸纳修炼，九死一生才飞升灵界，再从灵界修到仙界。证道大罗后铸造太古丹炉，著赤帝丹经——三界丹修至高典籍。苍冥赌局中押注'天劫之力可以炼化为灵气回馈天地'。前六劫以丹炉炼化天劫灵气回馈三界，第七劫强度超限丹炉炸裂为三片。以肉身为炉、以命火炼劫，丹成人亡——最后炼化的灵气回馈大地，人界灵气从0.35微升至0.40，灵气复苏从此刻开始。丹霞得丹炉最大残片，赤帝丹经只存六成。临终前将遗言玉简托黑帝转交青帝，黑帝已带在身上超过四万年。"
