# --- 云游散人·风无迹 ---
# 来历成谜的赤足白袍高人，关键时刻的指引者
- id: 35
  name: "风无迹"
  dao_name: ""
  hobbies: "赤足走遍天下、观星推演天道、在山巅静坐听风、与飞鸟对话"
  summary: "来历成谜的赤足散人，元婴中期，超然世外的指引者"
  char_type: npc
  race: "人族"
  gender: "male"
  age: 0
  birthday: ""
  is_alive: true
  level: 4
  personality: "洒脱不羁的神秘高人，行踪不定，偶尔在关键时刻出现指点后辈。说话喜欢用比喻，从不直接给答案。对世间万物有一种旁观者的超然，但不冷漠——他会在最恰当的时机伸手。身份成谜，没有人知道他的来历和目的。"
  appearance: "看似三十出头的青年，面容清俊，眼神深邃如星空。长发随风飘散，不走动时也像在飞。最大的特征是永远赤足——无论什么地形都如履平地。"
