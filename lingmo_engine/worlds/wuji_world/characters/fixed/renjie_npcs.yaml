# --- 天道剑宗内门首席·陆沉渊 ---
# 林立的师兄兼引路人，外冷内热的剑道天才，感应到古剑冢异动
- id: 20
  name: "陆沉渊"
  dao_name: ""
  hobbies: "独自去古剑冢深处静坐、打磨剑招至力竭、用废铁片练习刻字（亡母教的）"
  summary: "剑宗内门首席，剑道天才，外冷内热，林立引路人"
  char_type: npc
  race: "人族"
  gender: "male"
  age: 28
  birthday: "198609/7/12"
  is_alive: true
  level: 3
  personality: "沉默寡言，外表冷峻如冰。对剑道有近乎偏执的追求，认为'剑无二心'。看似不近人情，实则默默关照后辈。对林立有一种复杂的感情——既是师兄的责任感，也被林立身上那种不顾一切的锐气触动，像看到了曾经的自己。"
  appearance: "身形修长挺拔，肤色苍白如纸，黑发束高髻以玉簪固定。眉目冷峻，薄唇紧抿，不怒自威。右手虎口有常年握剑磨出的厚茧，左腕缠着一截发黄的旧布条——入门前亡母的遗物，从不取下。"
  clothing: "天道剑宗内门弟子制式白衣，袖口和衣摆绣有剑纹。腰悬宗门配发铁剑'霜引'，剑鞘磨损但保养极好。"
  tags: ["剑修", "金丹", "天道剑宗", "沉默", "天才", "内门首席"]
  background: "天元域小修仙家族庶子，灵根测试时被天道剑宗长老一眼相中。入宗后以惊人天赋横扫同辈，二十岁筑基，二十五岁结丹，被誉为'百年一遇的剑道天才'。但家族嫡兄因嫉妒暗害其母，他回乡复仇后斩断家族关系，此后更加沉默。在古剑冢中感应到微弱剑意共鸣，独自修炼时常去剑冢深处静坐，是少数能在那里待上一整夜而不被残剑剑意反噬的弟子。"
  faction: "天道剑宗"
  faction_rank: "内门首席弟子"
  location: "大千世界/人界/沧澜域/剑冢州/天道剑宗"
  current_affairs: ["感应到古剑冢残剑剑意异动", "暗中调查宗门是否隐瞒了剑冢的秘密", "指导新入门弟子基础剑法"]
