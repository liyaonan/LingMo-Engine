  summary: "废灵脉散修女剑客，追寻残剑剑意，倔强独立"
  char_type: npc
  race: "人族"
  gender: "female"
  age: 35
  birthday: "198602/9/20"
  is_alive: true
  level: 2
  personality: "独立、倔强、沉默。不喜欢欠人情也不喜欢别人欠她。对剑道有纯粹的追求——不追求宗门资源、不追求境界突破，只想找到一把能与自己的剑心共鸣的剑。看似冷漠实则重情义，只是不善表达。"
  appearance: "英气逼人的女子，短发齐耳，肤色因常年在野外而偏深。左手腕有一道长疤——早年与妖兽搏斗留下的。眼神锐利，走路时手永远离剑柄不超过三寸。"
