# --- 碧云宗丹阁阁主·药尘子 ---
# 表面和善实则精于算计的丹道大师，控制七成丹药市场
- id: 23
  name: "药尘子"
  dao_name: "药尘"
  hobbies: "炼丹（永远在炼丹）、品鉴各地灵茶、翻看秘密账本、与各路商贩讨价还价"
  summary: "碧云宗丹阁阁主，人界丹药经济幕后操控者"
  char_type: npc
  race: "人族"
  gender: "male"
  age: 587
  birthday: "198050/11/3"
  is_alive: true
  level: 5
  personality: "表面和蔼可亲，永远笑眯眯的，说话慢条斯理，像个慈祥的邻家老爷爷。实则精于算计、城府极深。每一炉丹药的出产都是一次商业博弈，每一个'好心帮忙'背后都有账本。信奉'天下没有免费的午餐'。"
  appearance: "矮胖身材，圆脸秃顶，留着花白山羊胡。眼睛不大但精光内敛，看人时像在估算对方的价值。十指因常年炼丹而微微泛黄，指甲缝里永远有洗不掉的药渣。"
  clothing: "碧云宗长老级墨绿道袍，胸口绣'丹'字金纹。腰间挂着一只精巧的玉瓶——里面装的不是丹药，是他用来记秘密账目的微缩玉简。"
  tags: ["丹修", "化神", "碧云宗", "精明", "丹阁阁主"]
  background: "碧云宗丹阁阁主之位已坐了两百年。在他的经营下，碧云宗丹药垄断了人界复苏区七成的供应量。灵气复苏对他而言既是机遇也是威胁——新灵草意味着新丹方，但也意味着既有供应链可能被打乱。暗中与万毒谷有丹药原料的秘密交易。"
  faction: "碧云宗"
  faction_rank: "丹阁阁主"
  location: "大千世界/人界/天元域/太华州/碧云宗/丹阁"
