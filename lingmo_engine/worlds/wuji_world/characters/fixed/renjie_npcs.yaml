# --- 金刚寺住持·慧明方丈 ---
# 深谋远虑的体修领袖，在灵气复苏中布局未来权力重组
- id: 25
  name: "慧明方丈"
  dao_name: "慧明"
  hobbies: "抄写经文、与弟子论道、推演各域势力走向、在淬体石窟中闭关静思"
  summary: "金刚寺住持，深谋远虑的体修领袖，灵气复苏中的棋手"
  char_type: npc
  race: "人族"
  gender: "male"
  age: 890
  birthday: "197747/8/15"
  is_alive: true
  level: 5
  personality: "慈眉善目但深谋远虑的老僧。说话温和有礼，但每句话都像下棋——看似随意的一步，十年后才发现是关键落子。对灵气复苏的态度不是恐惧而是期待——'枯木逢春，未必不是好事'。但他的期待背后有着不为人知的考量。"
  appearance: "年迈僧人面容，皱纹深刻如刀刻，但精神矍铄。眉毛花白且极长，垂至眼角。目光温和但深邃，与他对视时会感觉被看穿了。身形不高但气场厚重，站在那里像一座不可撼动的山。"
  clothing: "金刚寺方丈袈裟，暗金色底纹绣有经文，但已经褪色发白。手持禅杖——金刚寺镇寺之宝'不动明王杖'，非战时只作拄杖使用。"
  tags: ["体修", "化神", "金刚寺", "深沉", "方丈"]
  background: "金刚寺第三十七代方丈，在位已三百年。年轻时曾是游历四方的武僧，足迹遍布人界五大域。继任方丈后将金刚寺从一个小型宗门发展为人界三大正道宗门之一，手段既有慈悲也有雷霆。灵气复苏后他是第一个公开表态'应顺应天道'的正道领袖，但真正目的是在混乱中为金刚寺争取更大的话语权。"
