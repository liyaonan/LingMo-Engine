# --- 天道剑宗执法长老·苍衍真人 ---
# 铁面无私的纪律维护者，对灵气复苏持谨慎忧虑态度
- id: 21
  name: "苍衍真人"
  dao_name: "苍衍"
  hobbies: "巡查宗门各处、记录弟子修炼进度、在执法堂独坐品茶、推演宗门防卫阵法"
  summary: "剑宗执法长老，铁面无私，灵气复苏的谨慎忧虑者"
  char_type: npc
  race: "人族"
  gender: "male"
  age: 312
  birthday: "198325/2/8"
  is_alive: true
  level: 4
  personality: "铁面无私，执法如山。对所有弟子一视同仁——也一视同仁地严厉。不苟言笑到近乎冷血，但私下会默默记下每个弟子的修炼瓶颈，在执法之余指点一二。对灵气复苏的态度是谨慎忧虑，认为'混乱中守住规矩比什么都重要'。"
  appearance: "中年男子面容，须发灰白交杂，眉心有一道竖纹。眼神锐利如鹰，任何小动作都逃不过他的观察。身形魁梧但步法轻灵，常年执法练出的气场让所有弟子绕道走。"
  clothing: "天道剑宗长老级灰白道袍，胸前绣'法'字金纹。手持宗门执法令牌，腰悬制式长剑'断念'。"
  tags: ["剑修", "元婴", "天道剑宗", "严厉", "执法长老"]
  background: "出身天道剑宗旁系，自幼在宗门长大。天赋不算顶尖，但胜在心性坚韧、行事公正。从外门弟子一步步爬到执法长老的位置，靠的不是天赋而是铁一般的自律。年轻时曾目睹一次灵潮爆发引发的宗门内乱——师长反目、弟子互残——这段经历让他对'失控'有极深的恐惧。灵气复苏后他是宗门内最积极主张加强管控的长老。"
  faction: "天道剑宗"
  faction_rank: "执法长老"
  location: "大千世界/人界/沧澜域/剑冢州/天道剑宗/执法堂"
  current_affairs: ["加强宗门巡查", "排查灵气复苏后混入宗门的可疑人物", "维护宗门内部秩序"]
  relationships:
    - target_id: 1
      label: "同门"
      desc: "林立的管束者，暗中认可其锐气"
    - target_id: 20
      label: "同门"
      desc: "内门首席弟子，器重其剑道天赋"
