# --- 碧云宗炼丹天才·苏婉清 ---
# 林立的跨宗朋友，开朗丹修，擅长用丹药解决问题
- id: 22
  name: "苏婉清"
  dao_name: ""
  hobbies: "研制新丹方、与林立争论哪种灵草更好闻、在碧云峰顶看日出、收集各地草药标本"
  summary: "碧云宗炼丹天才，开朗丹修，林立跨宗朋友"
  char_type: npc
  race: "人族"
  gender: "female"
  age: 22
  birthday: "198615/3/5"
  is_alive: true
  level: 2
  personality: "开朗健谈，笑起来像春风。对炼丹有着发自内心的热爱。看似大大咧咧实则心思细腻，善于察言观色。最大的缺点是过度自信——觉得自己什么丹都能炼出来，偶尔因此闯祸。"
  appearance: "圆脸杏眼，常带笑意。皮肤因常年靠近丹炉而微微泛红，手背有几道炼丹失败留下的浅疤。发髻上别着一根碧玉簪——宗门赏赐的'丹道新星'标志。"
  clothing: "碧云宗弟子制式淡青道袍，腰间系着一只自制的丹药包，鼓鼓囊囊。袖口永远有淡淡的丹药香气。"
  tags: ["丹修", "筑基", "碧云宗", "开朗", "天才"]
  background: "天元域灵墟城药商之女，从小在药铺长大。十岁测出火灵根后被碧云宗收为弟子，在丹道上的天赋让所有师兄师姐侧目。十五岁就能独立炼制中品丹药。在灵墟城的一次丹药交易会上偶然遇到来采购的林立，因一场丹炉事故的意外合作而结下友谊。"
  faction: "碧云宗"
  faction_rank: "内门弟子"
  location: "大千世界/人界/天元域/太华州/碧云宗"
  current_affairs: ["研究灵气复苏对新品种灵草的影响", "尝试开发适应高灵气环境的丹药配方"]
