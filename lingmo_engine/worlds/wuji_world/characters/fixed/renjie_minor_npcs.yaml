  age: 45
  birthday: "198592/12/1"
  is_alive: true
  level: 3
  personality: "沉默寡言的苦修僧人，信奉'以身为炉，淬炼大道'。不善于表达感情，但行动力极强——看到需要帮助的人会直接动手，做完就走。对远古遗址中的发现守口如瓶，但内心的震动无法掩饰。"
  appearance: "身形高大魁梧，皮肤黝黑如铁，浑身肌肉虬结。光头上有九个戒疤。眼神平静如古井，但在战斗时会变得锐利如刀。双拳布满老茧和伤疤。"
  clothing: "金刚寺僧袍，灰色粗布制成，简朴到近乎寒酸。脖挂佛珠——金刚寺特有的'重力珠'，每颗重达百斤。赤足行走。"
