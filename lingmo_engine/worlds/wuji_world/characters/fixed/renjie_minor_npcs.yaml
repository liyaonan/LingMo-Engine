  background: "荒墟域大荒城孤儿，自幼被金刚寺收养。体修天赋极高，二十岁完成第一次淬体蜕变，四十岁结丹。被派往荒墟域最大的远古遗址入口担任护法，在一次深入遗址的巡查中发现了被封印的远古体修功法残篇——以及一段关于'灵气循环'的惊人记录。"
  faction: "金刚寺"
