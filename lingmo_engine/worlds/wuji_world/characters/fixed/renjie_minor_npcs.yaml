# --- 万毒谷谷主之女·殷七七 ---
# 毒修世家的善良少女，虫蛊天赋异禀
- id: 26
  name: "殷七七"
  dao_name: ""
  hobbies: "培育新虫蛊品种、给每只虫蛊起名字、偷偷跑出谷采风、观察各种有趣的人"
  summary: "万毒谷谷主之女，虫蛊天赋异禀，本性善良"
  char_type: npc
  race: "人族"
  gender: "female"
  age: 19
  birthday: "198618/6/7"
  is_alive: true
  level: 2
  personality: "表面乖巧听话的谷主千金，内心却是个对毒物有疯狂好奇心的少女。养了一堆别人看了会做噩梦的虫蛊当宠物，给每只都起了名字。天性不坏，但因为从小被灌输'万毒谷才是正道'的观念，对正邪之分有自己一套扭曲但逻辑自洽的看法。"
  appearance: "容貌清秀但气质诡异。肤色偏白，嘴唇因为常年接触毒物而微微泛紫。发间别着一朵永不凋谢的紫色花——实际上是她培育的毒蛊花，活的。"
  clothing: "万毒谷女修制式紫黑劲装，紧身便于行动。袖口和裤腿都扎紧——不是防止虫子进去，是防止她的'宝贝'跑出来吓人。腰间挂着一只编得精致的虫笼。"
  tags: ["毒修", "筑基", "万毒谷", "少女", "虫蛊"]
  background: "万毒谷谷主殷无咎独女，自幼在毒瘴环境中长大，对各种毒素有天然的抗性。虫蛊天赋异禀，十二岁就培育出了自己的第一只灵蛊'紫电蝎'。谷主对她既疼爱又防备。她对外面的世界充满好奇，但被严格限制在万毒谷范围内活动。"
  faction: "万毒谷"
  faction_rank: "谷主之女"
  location: "大千世界/人界/瘴冥域/瘴毒州/万毒谷"
