# --- 蛮族大巫祝·阿古朵 ---
# 灵潮异变的敏锐感知者，世代传承巫蛊之术
- id: 28
  name: "阿古朵"
  dao_name: ""
  hobbies: "观察虫兽行为变化、在祭祀场跳巫舞、听祖母留下的巫祝口诀、采集南疆奇花异草"
  summary: "蛮族大巫祝，巫祝之眼感知灵潮异变，最年轻的巫祝"
  char_type: npc
  race: "人族"
  gender: "female"
  age: 23
  birthday: "198612/8/22"
  is_alive: true
  level: 2
  personality: "天真烂漫但直觉惊人。从小在部落中长大，对外面的世界一知半解但对天地灵气的感知能力极强。说话直来直去，不懂什么叫'委婉'。对灵潮异变有一种动物般的本能反应。虽然年轻但承担着部落的精神领袖职责。"
  appearance: "南疆蛮族特征明显，肤色深棕，五官棱角分明。双眼是罕见的琥珀色，瞳孔在特定光线下会呈现竖瞳——蛮族传说这是'巫祝之眼'。满头黑色小辫，辫间缀着骨头和兽牙饰品。身上画着巫纹。"
  clothing: "蛮族巫祝传统装束，兽皮短衣加骨饰腰裙。脖子上挂着历代巫祝传承的'灵骨项链'。赤足，脚踝绑着铜铃。"
  tags: ["巫道", "筑基", "蛮族", "直觉", "大巫祝"]
  background: "南疆蛮族寨的第十三代大巫祝，也是最年轻的一代。前任大巫祝（她的祖母）在灵潮开始异变时突然离世，临终前将巫祝之位传给了刚满十八岁的阿古朵。她继承了世代传承的巫蛊之术和灵潮观测法。灵气复苏后她的'巫祝之眼'频繁出现异象。"
  faction: "蛮族寨"
