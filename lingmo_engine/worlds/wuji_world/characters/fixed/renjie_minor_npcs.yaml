  appearance: "邋遢中年男子，蓬头垢面，衣衫褴褛。最显眼的是腰间挂着的巨大酒葫芦——比普通葫芦大三倍，据说永远喝不完。眼角常年通红，但在醉酒的迷蒙中偶尔闪过一丝不属于醉鬼的锐利。"
