# --- ID 3: 仙界篇主角 ---
# 李云霄，道号青帝。已完成散功：在第九次金仙劫中将毕生灵力封入十二枚焚炎符收入识海
# 修为尽散，以凡人之躯回到人界。先天资质仍在，但无境界增幅。
# 十二焚炎符封入识海，使用一枚少一枚，不可恢复。
# 作为NPC登场时：以"潦倒散修醉鬼"身份出现——没人看得出他曾经是大罗金仙
- id: 3
  name: "李云霄"
  dao_name: "青帝"
  hobbies: "喝酒、观星推演天道规律、制符实验（他称之为'画画'）、布阵自娱、混沌虚空漫游"
  summary: "李云霄，道号青帝，散功归凡，十二符藏于识海"
  char_type: npc
  race: "人族"
  age: 113730
  birthday: "84917/3/3"
  is_alive: true
  level: 0
  personality: "散功后记忆残缺，像一本被撕掉大半页的书。知道自己叫李云霄、道号青帝、曾经是大罗金仙——但'大罗金仙'四个字只是概念，没有任何实感，像在说别人的故事。知道自己选择散尽一切重新来过，但不记得为什么。偶尔发呆时脑中闪过模糊画面——雷光、符纸、某个大笑的人影——但抓不住。这种缺失感不痛苦，更像一种说不清的空洞。嗜酒如命的习惯还在，大概酒精能填补那些空白。洒脱依旧，但底色变了——以前是看透一切后的洒脱，现在是什么都没看过的天真。偶尔会下意识地以极高素养'随手'做出精妙之事。"
  appearance: "看似四十余岁中年男子。面容清俊，鬓角几缕白发来历不明——不记得是什么留下的。指尖长年制符留下的薄茧还在，但他不记得自己练过符。身形修长，站姿松松垮垮，像卸下了千钧重担——虽然他不记得那些重量。最常做的动作是摘下酒葫芦灌一口，然后咧嘴一笑。偶尔会不自觉地用手指在空中画符——线条精准得不像凡人——但他自己没注意到。"
  clothing: "宽松青灰长衫，腰系旧绳，绳上挂一只磨得发亮的酒葫芦。无冠散发，发尾绑一截青布条。脚踩磨损布履，全身上下找不出一件像样法宝。看起来就是个潦倒散修——但他自己也不确定从前是不是真的潦倒。"
  tags: ["散修", "符修", "阵修", "豁达", "凡人", "记忆缺失"]
  background: "他知道自己叫李云霄，道号青帝。知道自己曾经是大罗金仙——但'大罗金仙'意味着什么，他只剩概念没有实感。知道自己做过一件事：在第九次金仙劫中将毕生灵力封入十二枚焚炎符，收入识海。知道这是自己选的——但为什么这么选，想不起来了。除此之外是一片空白。不记得出身、不记得修炼历程、不记得任何同伴。偶尔梦到模糊的人影——一个沉默的人、一个大笑的人、一个点头的人、一个低语的人——醒来后什么都抓不住。基础修炼理论还在脑子里，像读过教科书但从未实践过。识海深处封着十二张符，他隐约感觉得到，但碰不到。如今以潦倒散修醉鬼的身份游荡于人界。喝酒、观星、偶尔帮帮后辈。不焦虑，不急迫——也许曾经很急迫，但他不记得了。"
  faction: ""
  faction_rank: "潦倒散修"
