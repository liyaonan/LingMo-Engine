# --- ID 1: 人界篇主角 ---
# 沧澜域青石镇猎户孤儿，中品灵根入天道剑宗，热血不服输
# 作为NPC登场时：以"刚入天道剑宗的外门弟子"身份出现
- id: 1
  name: "林立"
  dao_name: ""
  hobbies: "偷偷去宗门后山探险、追着师兄问修仙界传闻、跟同门比谁跑得快"
  summary: "沧澜域青石镇猎户孤儿，中品灵根入天道剑宗，热血不服输"
  char_type: npc
  race: "人族"
  age: 16
  birthday: "198631/11/23"
  is_alive: true
  level: 0
  personality: "热血冲动，敢想敢干。穷日子没磨掉他的锐气，反而让他对一切都充满不甘——不甘平凡，不甘认命。胆子大但不鲁莽，骨子里有猎人的直觉。待人直来直去，不记仇但也不服软。"
  appearance: "身材偏瘦但筋骨结实，肤色偏深，手有粗茧。黑色短发随意扎着，总有几缕不服帖地翘起来。额角一道幼年摔伤的浅疤。五官普通，但笑起来露出一排白牙，看着就让人觉得这人靠得住。"
  clothing: "入宗前穿打补丁的青灰短褂，草鞋。入宗后换素白外门道袍，动不动就撸袖子。道袍下摆被他偷偷剪短了半寸——'碍事'。"
  tags: ["剑修", "豪爽", "冲动", "正道", "外门弟子", "凡人"]
  background: "沧澜域青石镇猎户之子。末法时代边陲小镇，灵气稀薄到庄稼都长不好。七岁丧母（灵气枯竭引发瘟疫），十五岁丧父（冬猎冻饿交加），独活大半年，靠父亲教的猎户本事勉强没饿死。十六岁被路过天道剑宗长老发现中品灵根，收入外门。天道剑宗建在古剑冢残剑之上——据说那里埋着远古剑修的遗泽，没人知道那是白帝的剑意碎片。父亲教他打猎时说过：'遇到野兽别跑，站直了，它比你先怂。'"
  faction: "天道剑宗"
  faction_rank: "外门弟子"
