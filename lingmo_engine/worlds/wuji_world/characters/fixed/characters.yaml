# --- ID 2: 灵界篇主角 ---
# 姬氏叛谍，法修鬼道，筑基残躯携妖族幼童蛰伏人界
# 作为NPC登场时：以"带着孩子的流浪女药师"身份出现
- id: 2
  name: "姬瑶"
  dao_name: "幻心"
  hobbies: "研读人界药典、推演幻术微小变化、教小萤识字写字"
  summary: "姬氏叛谍，法修鬼道，筑基残躯携妖族幼童蛰伏人界"
  char_type: npc
  race: "人族"
  age: 3235
  birthday: "195412/4/17"
  is_alive: true
  level: 2
  personality: "表面温婉圆滑，善于以柔克刚，说话永远让人如沐春风。内心冷硬果断，数百年暗线生涯磨去了多余的感情。但对自己认定的守护对象有一种沉默而绝对的保护欲——这让她自己都感到意外。最危险的伪装不是外貌，是让所有人都觉得她无害。"
  appearance: "容貌秀丽，但常年用低阶幻术将五官压得平庸无害。偶尔幻术松懈时，能瞥见真实样貌：五官精致，眼尾微挑，目光锐利。左手腕内侧有一道破解石留下的灼痕，用布条缠着，从不示人。"
  clothing: "洗得发白的灰蓝布裙，腰系布带，肩背草药篓，打扮成走方卖药的普通女修。鞋底磨薄了也舍不得换——不是穷，是维持'穷'的人设。偶尔教小萤时会无意识地抚平衣襟——姬氏贵族礼仪的残留。"
  tags: ["法修", "鬼修", "狡诈", "果断", "中立", "暗探", "散修"]
  background: "紫微姬氏暗线出身，幼年便被选中培养为'影子'。数百年间在灵界以数十种身份潜伏，操控种族矛盾、刺探情报、抹杀目标。受命搜寻天感灵童时，在万劫域遭仇家伏击重伤。一个妖族小乞丐救了她，照料数日。她发现这孩子正是她找了数日未果的天感灵童。她没有向姬氏报告，而是用仅剩资源换取一块破解石，带着小萤撕裂界壁坠入人界。代价是灵力大幅损耗，从灵界炼虚期跌落至筑基初期。如今以'流浪药师'身份蛰伏青云镇。"
  faction: ""
  faction_rank: "流浪药师"
  location: "大千世界/人界/沧澜域/沧澜州/青石镇"
