# --- 天关老卒·铁柱 ---
# 铁岳州从军三万年的老兵，见过太多战友死在天魔爪下
- id: 26
  name: "铁柱"
  dao_name: ""
  hobbies: "磨刀（他说刀钝了天魔就不怕你了）、教新兵怎么活过第一仗、沉默"
  summary: "天关老卒，从军三万年，铁岳军中活最久的兵"
  char_type: npc
  race: "人族"
  age: 35058
  birthday: "163589/5/3"
  is_alive: true
  level: 10
  personality: "沉默寡言，像一块铁疙瘩。不爱说话但说的每句话都是保命的经验——'天魔从左边来的时候别往右跑，右边是另外一只'。对新兵凶狠但实际是保护——他见过太多热血的新兵冲上去就再也没回来。对嬴破军和嬴霜发自内心的尊敬——在他看来，这两位是真正为仙界卖命的人。"
  appearance: "粗壮敦实，比普通人矮半个头但宽一倍。满脸风霜刻出的皱纹，左眼有一道从眉骨到颧骨的旧伤——那是三万年前第一次与天魔交锋时留下的。双手巨大，布满茧子和伤疤，永远握着一把被磨得发亮的长刀。"
  clothing: "玄铁军制式铠甲，旧得看不出原本的颜色——被天魔的血液浸泡过太多次，已经变成了暗红色。铠甲上刻着密密麻麻的划痕——每杀一只天魔就刻一道。三万年下来，铠甲上已经没有空白处了。"
  tags: ["真仙", "体修", "玄天", "军人", "沉默", "老兵"]
  background: "铁岳州从军三万年的老兵。三万年前他还是一个刚从灵界飞升的愣头青，被分配到天关守边。那时候他以为仙界是天堂——直到第一天就看到战友被天魔撕成两半。三万年来，他身边换了一茬又一茬的人，只有他还活着。不是因为他最强，是因为他最谨慎——能不打的仗不打，能躲的攻击绝不硬接。他是铁岳军中活最久的兵，嬴破军曾亲自为他授勋。"
  faction: "玄天仙域"
  faction_rank: "天关老卒"
