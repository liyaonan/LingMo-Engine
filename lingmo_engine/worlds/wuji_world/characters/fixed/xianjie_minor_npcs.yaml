- id: 28
  name: "白露"
  dao_name: ""
  hobbies: "背诵丹方（她的消遣）、照料太古丹炉旁的药圃、偷看师父的私人笔记"
  summary: "丹霞学徒，姜不危的关门弟子，发现了续命丹配方的致命隐患"
  char_type: npc
  race: "人族"
  age: 1264
  birthday: "197383/4/11"
  is_alive: true
  level: 8
  personality: "安静认真，做事一丝不苟，对丹道有近乎虔诚的执着。看起来是个乖巧听话的小徒弟，实际上有自己的主见——她敢于质疑师父的丹方，这在丹霞是前所未有的事。说话轻声细语，但在提到丹道问题时会变得异常坚定。"
  appearance: "看似十六七岁的少女，面容清秀素净，不施脂粉。双手因常年接触药材而微微泛着药香。总是一身干净的白色炼丹服，袖口系着防烫的护腕。最引人注意的是她的眼睛——看丹方时专注得像在看一个解不开的谜题。"
