# --- 万宝仙市商人·钱多多 ---
# 什么都能买到，包括不该买的东西
- id: 27
  name: "钱多多"
  dao_name: "万通"
  hobbies: "数灵石（真正的爱好）、鉴定各种稀奇古怪的宝物、研究各势力的供需关系"
  summary: "万宝仙市商人，什么都能买到，包括秘密"
  char_type: npc
  race: "人族"
  age: 22064
  birthday: "176583/8/21"
  is_alive: true
  level: 9
  personality: "精明到骨子里，但精明得让人舒服——他从不对客人说不好的话，只是笑着告诉你'这个嘛，可以商量'。对灵石有近乎病态的执着，但他不是为了享受，而是因为他在仙界没有任何靠山，灵石是他唯一的安全网。他比谁都清楚仙界的物价波动意味着什么——当续命丹的价格开始飙升，说明有大人物渡劫在即。"
  appearance: "矮胖圆润，像个移动的球。圆脸上永远挂着生意人的笑容——和气生财。穿着比实际身份更显眼的锦缎长袍，戴满各种叮当作响的饰品——不是为了好看，是让客人知道他有钱、有货、靠得住。"
  clothing: "丹霞锦缎长袍，赤金色的，明显是万宝仙市的商人制服但被他改得更花哨。十个手指戴了八枚戒指——每枚都是储物戒。腰间挂三四个储物袋，走起路来叮当乱响。整个人看起来就像一个会走路的仓库。"
  tags: ["渡劫期", "法修", "丹霞", "商人", "狡诈", "情报"]
  background: "万宝仙市的小商人，表面卖杂货，实际什么都卖——只要出得起灵石。他在仙界没有任何靠山，不属于任何势力，但他的商业网络遍布四域。他有一本账本记录了所有客户的购买记录——这些记录本身就是无价的情报。他知道谁在囤积续命丹（说明有人在准备渡劫），谁在大量购买疗伤药（说明刚打过仗），谁在收购域外材料（说明有人在研究天魔）。他从不主动出卖客户信息，但如果你出的灵石够多……"
