# --- 新飞升者·沈归雁 ---
# 刚从灵界飞升仙界的幸运儿，对仙界的一切充满期待
- id: 25
  name: "沈归雁"
  dao_name: ""
  hobbies: "探索仙界各地（看什么都新鲜）、向人打听仙界的规矩、修炼（仙气太充沛了！）"
  summary: "新飞升者，灵界出身，对仙界充满幻想，即将被现实击碎"
  char_type: npc
  race: "人族"
  age: 8535
  birthday: "190112/7/29"
  is_alive: true
  level: 9
  personality: "充满热情和好奇心，看什么都新鲜，问什么都想知道。对仙界抱有近乎天真的崇拜——在他看来飞升仙界就是修仙者的终点，从此可以永享仙福。他的乐观会让玩家想起自己刚踏入修仙界时的样子。但他很快就会发现：仙界不是天堂，只是另一个牢笼。"
  appearance: "年轻男子，看似二十余岁，面容俊朗，眼睛里带着少年人的锐气和好奇。皮肤上还残留着飞升时天劫留下的淡金色纹路——那是刚飞升不久的标记。走路时步伐轻快，像踩在云上——事实上他确实不太适应仙界的灵气浓度，走路都有点飘。"
  clothing: "灵界带来的旧法袍——在灵界算好的，在仙界却显得寒酸。没有仙界的身份标识，没有任何仙器法宝。腰间的储物袋瘪得可怜——飞升过程中大部分家当都损耗了。整个人看起来像个刚到大城市的乡下少年。"
  tags: ["渡劫期", "新飞升", "灵界", "好奇", "天真"]
  background: "灵界落尘域人族修士，大乘期圆满后飞升仙界。在灵界他算是人族中的强者，独自修炼到飞升，是同辈中的传奇。飞升成功后他以为一切苦难都结束了——然后发现仙界的灵气浓度是灵界的两倍、实力比自己强的人遍地都是、飞升者会被各方势力当作'新鲜血液'争抢。他还没意识到自己是一枚棋盘上的新棋子。"
  faction: ""
  faction_rank: "新飞升者（无归属）"
  location: "大千世界/灵界/弈天域/天柱州/通天塔/飞升感应台"
  current_affairs: ["适应仙界灵气浓度", "寻找落脚之处", "了解仙界的规矩和势力分布", "避免被各方势力拉拢利用"]
