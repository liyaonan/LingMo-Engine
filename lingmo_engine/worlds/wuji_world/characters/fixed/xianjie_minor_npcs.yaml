  name: "夜枭"
  dao_name: ""
  hobbies: "追踪目标、保养武器、在醉仙楼喝浮白（宋浮白酿的）"
  summary: "苍冥赏金猎人，只认钱不认人，逍遥城赏金榜常客"
  char_type: npc
  race: "人族"
  age: 38064
  birthday: "160583/2/14"
  is_alive: true
  level: 10
  personality: "冷硬务实，不做多余的事，不说多余的话。职业操守只有一条：拿了钱就把活干完。不问目标是谁，不问雇主是谁，不问为什么——只问多少钱。这不是冷血，是他活下来的方式。在苍冥这种地方，感情用事的人死得最快。但他有一条底线：不杀孩子。这是他唯一的规矩。"
  appearance: "看似三十余岁男子，面容冷峻，五官如刀刻。一身深灰色劲装，永远戴着一顶宽檐帽遮住半张脸。走路无声，像一只真正的枭——你不会发现他，直到他站到你面前。双手永远空闲着——武器藏在袖中和靴筒里。"
  clothing: "深灰色劲装，面料是特制的消音材质——他行动时不会发出任何声响。宽檐帽檐压得很低，只露出下巴和嘴。腰间没有显眼的武器，但袖口和靴筒里藏着短刃和暗器。背着一个不大的行囊——赏金猎人不需要行李，只需要武器和灵石。"
  tags: ["真仙", "法修", "苍冥", "赏金猎人", "冷酷"]
  background: "苍冥最出名的赏金猎人之一。没人知道他的来历，就像没人知道夜枭这种鸟从哪里来——它们只出现在黑暗中。他在逍遥城赏金榜上完成了最多的任务，从追杀叛逃散仙到回收被偷的法宝。风九歌对他睁一只眼闭一只眼——夜枭从不逍遥城内动手，这是他和城主的默契。最近赏金榜上出现了几单来自紫微方向的悬赏——目标似乎都与灵界的某个叛逃暗探有关。夜枭接了其中一单。"
