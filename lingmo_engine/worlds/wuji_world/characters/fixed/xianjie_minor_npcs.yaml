# --- 雷劫幸存散仙·秦无恙 ---
# 三千散仙雷劫缓冲中仅存的四十七人之一
# 他是仙帝罪行的活证据
- id: 24
  name: "秦无恙"
  dao_name: ""
  hobbies: "在苍冥各处散仙聚居地讲述雷劫真相、修炼（尽管修为已经废了大半）"
  summary: "雷劫幸存散仙，三千人只活四十七，仙帝罪行的活证据"
  char_type: npc
  race: "人族"
  age: 52064
  birthday: "146583/12/17"
  is_alive: true
  level: 8
  personality: "曾经是个开朗的散仙，雷劫之后变得沉默阴郁。眼神里有一种被背叛后的空洞——他自愿响应号召去'协助仙帝渡劫'，以为是在做一件荣耀的事，结果发现自己只是炮灰。现在逢人就说雷劫的真相，但大部分人不敢听、不愿信。唯一支撑他活下去的理由：等一个能审判仙帝的人出现，亲口作证。"
  appearance: "身形枯瘦，面色灰败，看似风烛残年——实际上他才渡劫期，应该正值壮年。第九次金仙劫的雷火在他身上留下了无法修复的伤痕：右手从肘部以下焦黑如炭，已经失去知觉，他没有截掉是因为那道焦痕是证据。"
  clothing: "一件破旧的散仙袍，脏得看不出颜色。右手用布条缠着，不让人看到焦黑的痕迹——不是因为羞耻，是因为每看一次都会想起那个夜晚。"
  tags: ["大乘期", "散仙", "苍冥", "雷劫幸存", "证人"]
  background: "原本是苍冥逍遥城的一名普通散仙，在大乘期安稳度日。仙帝第九次金仙劫前夕，天枢仙域发布征召令：征召散仙'协助仙帝渡劫'，许以丰厚灵石报酬。三千散仙响应号召前往。到了混沌虚空才发现，他们不是协助者，而是雷劫缓冲——被布阵者安排在天劫落点的边缘，用自己的肉身分散雷劫余波。三千人进去，四十七人活着出来。秦无恙是其中之一。他亲眼看到身边的同伴一个接一个被雷火吞噬，而凌霄宝殿方向传来的是庆祝渡劫成功的钟声。"
  faction: ""
  faction_rank: "流亡散仙"
  location: "大千世界/仙界/苍冥仙域/逍遥州/逍遥城"
  current_affairs: ["在各散仙聚居地讲述雷劫真相", "等待能审判仙帝的人出现", "保全性命作为活证"]
  relationships:
