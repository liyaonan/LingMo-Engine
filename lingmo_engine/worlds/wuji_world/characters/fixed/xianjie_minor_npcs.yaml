  tags: ["大乘期", "丹修", "丹霞", "学徒", "聪慧"]
  background: "姜不危最小的徒弟，也是天赋最高的一个。火系天灵根让她在丹道上进步神速，连姜不危都惊叹她的灵药感知力。在协助师父整理太古丹方时，她发现了一个被忽视了一千年的细节：续命丹的核心成分太古灵脂，在炼制过程中会产生一种微量的副产物——这种副产物会在服用者体内缓慢积累，每次服用都会增加下一次天劫的威力。换言之，续命丹能帮你渡过这一次天劫，但会让下一次更猛烈。仙帝已经服用了数千颗续命丹——他体内的副产物积累已经到了什么程度？这个发现她只告诉了姜不危，姜不危沉默了整整一天。"
